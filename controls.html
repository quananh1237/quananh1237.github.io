<!-- controls.html -->
<div id="ui" style="
  height: 20vh;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
  position: absolute;
  bottom: 10vh; /* cho các nút cao lên một chút */
  width: 100%;
  z-index: 10;
">
  <div class="joystick-container" id="joystick-container" style="
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    position: relative;
    touch-action: none;
  ">
    <div class="joystick" id="joystick" style="
      width: 60px; height: 60px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 20px; left: 20px;
      touch-action: none;
    "></div>
  </div>

  <div class="buttons" style="
    display: flex;
    flex-direction: column;
    gap: 10px;
  ">
    <button id="shoot">Shoot</button>
    <button id="pass">Pass</button>
    <button id="speed">Speed</button>
  </div>
</div>
