<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sân Bóng Có Điều Khiển</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      z-index: 1;
    }
    .controls button {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      background-color: #444;
      color: white;
      cursor: pointer;
    }
    .controls button:active {
      background-color: #222;
    }
  </style>
</head>
<body>
<div class="controls">
  <button id="left">⬅️</button>
  <button id="right">➡️</button>
  <button id="up">⬆️</button>
  <button id="down">⬇️</button>
  <button id="pass">Pass</button>
  <button id="shoot">Shoot</button>
  <button id="speed">Speed</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(50, 50, 50).normalize();
  scene.add(light);

  const field = new THREE.Mesh(new THREE.PlaneGeometry(100, 60), new THREE.MeshPhongMaterial({color: 0x228B22}));
  field.rotation.x = -Math.PI / 2;
  scene.add(field);

  const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
  const centerLineGeometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.01, -30),
    new THREE.Vector3(0, 0.01, 30)
  ]);
  scene.add(new THREE.Line(centerLineGeometry, lineMaterial));

  const goalMaterial = new THREE.MeshBasicMaterial({color: 0xffffff});
  const goalGeometry = new THREE.BoxGeometry(1, 5, 10);
  const goalLeft = new THREE.Mesh(goalGeometry, goalMaterial);
  goalLeft.position.set(-50, 2.5, 0);
  scene.add(goalLeft);
  const goalRight = new THREE.Mesh(goalGeometry, goalMaterial);
  goalRight.position.set(50, 2.5, 0);
  scene.add(goalRight);

  const ball = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshPhongMaterial({color: 0xffffff}));
  ball.position.set(0, 1, 0);
  scene.add(ball);

  const player = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4, 32), new THREE.MeshPhongMaterial({color: 0xff0000}));
  player.position.set(-10, 2, 0);
  scene.add(player);

  const standMaterial = new THREE.MeshPhongMaterial({color: 0xaaaaaa});
  const standLeft = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 60), standMaterial);
  standLeft.position.set(-55, 5, 0);
  scene.add(standLeft);
  const standRight = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 60), standMaterial);
  standRight.position.set(55, 5, 0);
  scene.add(standRight);

  camera.position.set(0, 50, 80);
  camera.lookAt(0, 0, 0);

  // Điều khiển
  let move = { left: false, right: false, up: false, down: false };
  let speed = 0.5;

  document.getElementById("left").addEventListener("mousedown", () => move.left = true);
  document.getElementById("right").addEventListener("mousedown", () => move.right = true);
  document.getElementById("up").addEventListener("mousedown", () => move.up = true);
  document.getElementById("down").addEventListener("mousedown", () => move.down = true);
  document.getElementById("left").addEventListener("mouseup", () => move.left = false);
  document.getElementById("right").addEventListener("mouseup", () => move.right = false);
  document.getElementById("up").addEventListener("mouseup", () => move.up = false);
  document.getElementById("down").addEventListener("mouseup", () => move.down = false);

  document.getElementById("speed").addEventListener("click", () => {
    speed = speed === 0.5 ? 1.5 : 0.5;
  });

  document.getElementById("shoot").addEventListener("click", () => {
    // Đẩy bóng về phía trước cầu môn
    const direction = new THREE.Vector3().subVectors(ball.position, player.position).normalize();
    ball.position.add(direction.multiplyScalar(5));
  });

  document.getElementById("pass").addEventListener("click", () => {
    const direction = new THREE.Vector3().subVectors(ball.position, player.position).normalize();
    ball.position.add(direction.multiplyScalar(2));
  });

  function animate() {
    requestAnimationFrame(animate);

    if (move.left) player.position.x -= speed;
    if (move.right) player.position.x += speed;
    if (move.up) player.position.z -= speed;
    if (move.down) player.position.z += speed;

    // Nếu gần bóng, bóng đi theo người
    if (player.position.distanceTo(ball.position) < 3) {
      ball.position.x = player.position.x;
      ball.position.z = player.position.z + 2;
    }

    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
