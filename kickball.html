<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sân Bóng 3D</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Light
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(50, 50, 50).normalize();
  scene.add(light);

  // Sân cỏ
  const grassTexture = new THREE.MeshPhongMaterial({color: 0x228B22});
  const field = new THREE.Mesh(new THREE.PlaneGeometry(100, 60), grassTexture);
  field.rotation.x = -Math.PI / 2;
  scene.add(field);

  // Vạch giữa sân
  const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
  const centerLineGeometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.01, -30),
    new THREE.Vector3(0, 0.01, 30)
  ]);
  const centerLine = new THREE.Line(centerLineGeometry, lineMaterial);
  scene.add(centerLine);

  // Gôn trái
  const goalMaterial = new THREE.MeshBasicMaterial({color: 0xffffff});
  const goalGeometry = new THREE.BoxGeometry(1, 5, 10);
  const goalLeft = new THREE.Mesh(goalGeometry, goalMaterial);
  goalLeft.position.set(-50, 2.5, 0);
  scene.add(goalLeft);

  // Gôn phải
  const goalRight = new THREE.Mesh(goalGeometry, goalMaterial);
  goalRight.position.set(50, 2.5, 0);
  scene.add(goalRight);

  // Bóng
  const ballGeometry = new THREE.SphereGeometry(1, 32, 32);
  const ballMaterial = new THREE.MeshPhongMaterial({color: 0xffffff});
  const ball = new THREE.Mesh(ballGeometry, ballMaterial);
  ball.position.set(0, 1, 0);
  scene.add(ball);

  // Người chơi (hình trụ mô phỏng)
  const playerMaterial = new THREE.MeshPhongMaterial({color: 0xff0000});
  const player = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4, 32), playerMaterial);
  player.position.set(-10, 2, 0);
  scene.add(player);

  // Khán đài (đơn giản hoá)
  const standMaterial = new THREE.MeshPhongMaterial({color: 0xaaaaaa});
  const standLeft = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 60), standMaterial);
  standLeft.position.set(-55, 5, 0);
  scene.add(standLeft);

  const standRight = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 60), standMaterial);
  standRight.position.set(55, 5, 0);
  scene.add(standRight);

  // Camera
  camera.position.set(0, 50, 80);
  camera.lookAt(0, 0, 0);

  // Render loop
  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
