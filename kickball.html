<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Bóng Đá Mini</title>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; background: black;
      touch-action: none;
    }
    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    iframe#controlsFrame {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 230px; /* Tăng chiều cao iframe cho đủ nút và joystick */
      border: none;
      background: transparent;
      pointer-events: auto;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="gameContainer"></div>

  <!-- Nhúng controls.html qua iframe -->
  <iframe id="controlsFrame" src="controls.html"></iframe>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script>
    const container = document.getElementById("gameContainer");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Ánh sáng
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(50, 50, 50).normalize();
    scene.add(light);

    // Sân bóng
    const field = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 60),
      new THREE.MeshPhongMaterial({color: 0x228B22})
    );
    field.rotation.x = -Math.PI / 2;
    scene.add(field);

    // Viền sân đơn giản
    const lineMaterial = new THREE.LineBasicMaterial({color: 0xffffff});
    const fieldEdges = new THREE.EdgesGeometry(new THREE.PlaneGeometry(100, 60));
    const fieldLines = new THREE.LineSegments(fieldEdges, lineMaterial);
    fieldLines.rotation.x = -Math.PI / 2;
    fieldLines.position.y = 0.01;
    scene.add(fieldLines);

    // Cầu môn đơn giản
    const goalMaterial = new THREE.MeshPhongMaterial({color: 0xffffff});
    const goalFrameGeometry = new THREE.BoxGeometry(12, 6, 1);
    const goalBackGeometry = new THREE.PlaneGeometry(12, 6);
    // Khung cầu môn trước (2 khung bên, trên)
    const goalLeftPost = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 0.5), goalMaterial);
    goalLeftPost.position.set(-6, 3, -30);
    scene.add(goalLeftPost);

    const goalRightPost = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 0.5), goalMaterial);
    goalRightPost.position.set(6, 3, -30);
    scene.add(goalRightPost);

    const goalCrossbar = new THREE.Mesh(new THREE.BoxGeometry(12, 0.5, 0.5), goalMaterial);
    goalCrossbar.position.set(0, 6, -30);
    scene.add(goalCrossbar);

    // Lưới cầu môn (phía sau)
    const goalNet = new THREE.Mesh(goalBackGeometry, new THREE.MeshPhongMaterial({color: 0xcccccc, side: THREE.DoubleSide, opacity: 0.5, transparent: true}));
    goalNet.position.set(0, 3, -30.5);
    scene.add(goalNet);

    // Cầu thủ (player)
    const player = new THREE.Mesh(
      new THREE.CylinderGeometry(1, 1, 4, 32),
      new THREE.MeshPhongMaterial({color: 0xff0000})
    );
    player.position.set(0, 2, 0);
    scene.add(player);

    // Bóng
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(1, 32, 32),
      new THREE.MeshPhongMaterial({color: 0xffffff})
    );
    ball.position.set(5, 1, 0);
    scene.add(ball);

    let speed = 0.5;
    let ballVelocity = new THREE.Vector3();

    // Lấy dữ liệu joystick từ iframe controls
    window.getJoystickDirection = () => {
      const iframe = document.getElementById('controlsFrame');
      if (iframe && iframe.contentWindow && iframe.contentWindow.getJoystickDirection) {
        return iframe.contentWindow.getJoystickDirection();
      }
      return { dirX: 0, dirZ: 0 };
    };

    // Nhận sự kiện nút từ iframe qua postMessage
    window.addEventListener('message', (event) => {
      if (!event.data) return;
      switch(event.data.type) {
        case 'shoot':
          {
            const angle = player.rotation.y;
            ballVelocity.set(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(1.5);
          }
          break;
        case 'pass':
          {
            const angle = player.rotation.y;
            ballVelocity.set(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(0.7);
          }
          break;
        case 'speed':
          {
            speed = speed === 0.5 ? 1.5 : 0.5;
          }
          break;
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      // Di chuyển cầu thủ theo joystick
      const { dirX, dirZ } = window.getJoystickDirection();
      if (dirX !== 0 || dirZ !== 0) {
        player.position.x += dirX * speed;
        player.position.z += dirZ * speed;
        const angle = Math.atan2(dirX, dirZ);
        player.rotation.y = angle;
      }

      // Giới hạn sân
      player.position.x = Math.max(-48, Math.min(48, player.position.x));
      player.position.z = Math.max(-28, Math.min(28, player.position.z));
      ball.position.x = Math.max(-48, Math.min(48, ball.position.x));
      ball.position.z = Math.max(-28, Math.min(28, ball.position.z));

      // Bóng chuyển động
      if (ballVelocity.length() > 0.01) {
        ball.position.add(ballVelocity);
        ballVelocity.multiplyScalar(0.96);
      }
      if (ballVelocity.length() < 0.05) ballVelocity.set(0, 0, 0);
      if (ball.position.y < 1) ball.position.y = 1;

      // Camera theo player
      const camOffset = new THREE.Vector3(0, 25, 40);
      const camTarget = player.position.clone();
      camera.position.copy(camTarget).add(camOffset);
      camera.lookAt(camTarget);

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    });

    animate();
  </script>
</body>
</html>
