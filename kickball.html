<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Game Bóng Đá Mini - Fix Màn Hình Ngang + Camera + Bóng</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    display: flex; flex-direction: column;
    background: #222;
    user-select: none;
  }
  #game-container {
    flex: 1 1 auto;
    height: 80vh;
    background: #228B22;
    position: relative;
  }
  canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }
  #ui {
    height: 20vh;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    box-sizing: border-box;
  }
  .joystick-container {
    width: 100px; height: 100px;
    background: rgba(255 255 255 / 0.2);
    border-radius: 50%;
    position: relative;
    touch-action: none;
  }
  .joystick {
    width: 60px; height: 60px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    top: 20px; left: 20px;
    touch-action: none;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .buttons button {
    width: 80px; height: 40px;
    border: none;
    border-radius: 8px;
    background-color: #444;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
  .buttons button:active {
    background-color: #222;
  }
</style>
</head>
<body>

<div id="game-container"></div>

<div id="ui">
  <div class="joystick-container" id="joystick-container">
    <div class="joystick" id="joystick"></div>
  </div>

  <div class="buttons">
    <button id="shoot">Shoot</button>
    <button id="pass">Pass</button>
    <button id="speed">Speed</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
  const container = document.getElementById('game-container');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  // Ánh sáng
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(50, 50, 50).normalize();
  scene.add(light);

  // Sân bóng
  const field = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 60),
    new THREE.MeshPhongMaterial({ color: 0x228B22 })
  );
  field.rotation.x = -Math.PI / 2;
  scene.add(field);

  // Viền chia sân và vòng tròn giữa
  const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
  const midLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.1, -30), new THREE.Vector3(0, 0.1, 30)
  ]);
  const midLine = new THREE.Line(midLineGeo, lineMaterial);
  scene.add(midLine);

  const centerCircle = new THREE.Mesh(
    new THREE.RingGeometry(7.9, 8, 64),
    new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
  );
  centerCircle.rotation.x = -Math.PI / 2;
  scene.add(centerCircle);

  const centerDot = new THREE.Mesh(
    new THREE.CircleGeometry(0.3, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  centerDot.rotation.x = -Math.PI / 2;
  centerDot.position.y = 0.1;
  scene.add(centerDot);

  // Vùng cấm địa (box)
  const boxGeometry = new THREE.PlaneGeometry(16, 30);
  const boxMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, opacity: 0.3, transparent: true });
  const leftBox = new THREE.Mesh(boxGeometry, boxMaterial);
  leftBox.rotation.x = -Math.PI / 2;
  leftBox.position.set(-42, 0.05, 0);
  scene.add(leftBox);

  const rightBox = leftBox.clone();
  rightBox.position.x = 42;
  scene.add(rightBox);

  // Gôn có lưới (khung)
  function createGoal(x) {
    const postMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const post1 = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 1), postMat);
    const post2 = post1.clone();
    const crossbar = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 10), postMat);
    post1.position.set(x, 2.5, -5);
    post2.position.set(x, 2.5, 5);
    crossbar.position.set(x, 5, 0);
    scene.add(post1, post2, crossbar);
  }
  createGoal(-49.5);
  createGoal(49.5);

  // Rào chắn sân
  const wallMaterial = new THREE.MeshBasicMaterial({color: 0x888888, opacity: 0.3, transparent: true});
  const walls = [
    new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 60), wallMaterial), // trái
    new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 60), wallMaterial), // phải
    new THREE.Mesh(new THREE.BoxGeometry(100, 5, 0.5), wallMaterial), // sau
    new THREE.Mesh(new THREE.BoxGeometry(100, 5, 0.5), wallMaterial)  // trước
  ];
  walls[0].position.set(-50.25, 2.5, 0);
  walls[1].position.set(50.25, 2.5, 0);
  walls[2].position.set(0, 2.5, -30.25);
  walls[3].position.set(0, 2.5, 30.25);
  walls.forEach(w => scene.add(w));

  // Cầu thủ
  const player = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4, 32), new THREE.MeshPhongMaterial({color: 0xff0000}));
  player.position.set(0, 2, 0);
  scene.add(player);

  // Bóng
  const ball = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshPhongMaterial({color: 0xffffff}));
  ball.position.set(5, 1, 0);
  scene.add(ball);

  // Vòng xanh dưới chân cầu thủ (hiện khi gần bóng)
  const ringGeometry = new THREE.RingGeometry(1.5, 2, 32);
  const ringMaterial = new THREE.MeshBasicMaterial({color: 0x00ff00, side: THREE.DoubleSide});
  const ring = new THREE.Mesh(ringGeometry, ringMaterial);
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);
  ring.visible = false;

  // Camera mặc định
  camera.position.set(0, 50, 80);
  camera.lookAt(0, 0, 0);

  // Joystick & điều khiển cầu thủ
  let joystick = document.getElementById("joystick");
  let containerJoystick = document.getElementById("joystick-container");
  let isDragging = false, speed = 0.5;
  let dirX = 0, dirZ = 0;

  containerJoystick.addEventListener("touchstart", (e) => { isDragging = true; });
  containerJoystick.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if (!isDragging) return;
    const rect = containerJoystick.getBoundingClientRect();
    const touch = e.touches[0];
    let x = touch.clientX - rect.left - 50;
    let y = touch.clientY - rect.top - 50;
    const max = 30;
    x = Math.max(-max, Math.min(max, x));
    y = Math.max(-max, Math.min(max, y));
    joystick.style.left = `${20 + x}px`;
    joystick.style.top = `${20 + y}px`;
    dirX = x / max;
    dirZ = y / max;
  });
  containerJoystick.addEventListener("touchend", () => {
    isDragging = false;
    joystick.style.left = "20px";
    joystick.style.top = "20px";
    dirX = 0;
    dirZ = 0;
  });

  // Bóng vận tốc
  let ballVelocity = new THREE.Vector3(0, 0, 0);

  // Nút Shoot, Pass, Speed
  document.getElementById("shoot").addEventListener("click", () => {
    const angle = player.rotation.y;
    ballVelocity.set(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(1.5);
  });

  document.getElementById("pass").addEventListener("click", () => {
    const angle = player.rotation.y;
    ballVelocity.set(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(0.7);
  });

  document.getElementById("speed").addEventListener("click", () => {
    speed = speed === 0.5 ? 1.5 : 0.5;
  });

  function animate() {
    requestAnimationFrame(animate);

    // Di chuyển cầu thủ theo joystick
    if (dirX !== 0 || dirZ !== 0) {
      player.position.x += dirX * speed;
      player.position.z += dirZ * speed;
      const angle = Math.atan2(dirX, dirZ);
      player.rotation.y = angle;
    }

    // Giới hạn cầu thủ trong sân (cách rào chắn 0.75)
    player.position.x = Math.max(-49, Math.min(49, player.position.x));
    player.position.z = Math.max(-29, Math.min(29, player.position.z));

    // Cập nhật vị trí bóng theo vận tốc
    if (ballVelocity.length() > 0.01) {
      ball.position.add(ballVelocity);

      // Giới hạn bóng trong sân (cách rào chắn 1)
      ball.position.x = Math.max(-49, Math.min(49, ball.position.x));
      ball.position.z = Math.max(-29, Math.min(29, ball.position.z));

      // Giảm vận tốc do ma sát
      ballVelocity.multiplyScalar(0.96);
    }

    if (ballVelocity.length() < 0.05) ballVelocity.set(0, 0, 0);

    // Bóng không tụt xuống dưới sân
    if (ball.position.y < 1) ball.position.y = 1;

    // Vòng xanh hiện khi cầu thủ gần bóng (<=4 đơn vị)
    const dist = player.position.distanceTo(ball.position);
    ring.visible = dist <= 4;
    ring.position.set(player.position.x, 0.1, player.position.z);

    // Camera theo cầu thủ
    const camOffset = new THREE.Vector3(0, 25, 40);
    const camTarget = player.position.clone();
    camera.position.copy(camTarget).add(camOffset);
    camera.lookAt(camTarget);

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  animate();
</script>

</body>
</html>
