<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Bóng Đá Mini - Cập Nhật</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #222;
      user-select: none;
    }
    #game-container {
      width: 100vw;
      height: 80vh;
      background: #228B22;
      position: relative;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    #ui {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 20vh;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      box-sizing: border-box;
      z-index: 10;
    }
    .joystick-container {
      width: 100px; height: 100px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      position: relative;
      touch-action: none;
    }
    .joystick {
      width: 60px; height: 60px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 20px; left: 20px;
      touch-action: none;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .buttons button {
      width: 80px; height: 40px;
      border: none;
      border-radius: 8px;
      background-color: #444;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    .buttons button:active {
      background-color: #222;
    }
    #power-bar {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      background: rgba(255,255,255,0.2);
      border: 1px solid #fff;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    #power-fill {
      height: 100%;
      width: 0%;
      background: #0f0;
      transition: width 0.1s;
    }
  </style>
</head>
<body>

<div id="game-container"></div>

<div id="ui">
  <div class="joystick-container" id="joystick-container">
    <div class="joystick" id="joystick"></div>
  </div>

  <div class="buttons">
    <button id="shoot">Shoot</button>
    <button id="pass">Pass</button>
    <button id="speed">Speed</button>
  </div>
</div>

<div id="power-bar">
  <div id="power-fill"></div>
</div>
