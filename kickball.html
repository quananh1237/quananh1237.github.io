<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Sân Bóng 3D Đơn Giản</title>
  <style>
    body, html {
      margin: 0; padding: 0; overflow: hidden;
      height: 100%; width: 100%;
      background: #87ceeb; /* trời xanh */
      display: flex; justify-content: center; align-items: center;
    }
    #canvas-container {
      width: 800px;
      height: 450px;
      border: 2px solid #444;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <!-- Thư viện Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script>
    // Tạo scene, camera, renderer
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, 800/450, 0.1, 1000);
    camera.position.set(0, 50, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(800, 450);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Ánh sáng
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);

    // Mặt sân bóng (hình chữ nhật màu xanh)
    const fieldGeometry = new THREE.BoxGeometry(70, 1, 40);
    const fieldMaterial = new THREE.MeshPhongMaterial({ color: 0x0b6623 }); // xanh cỏ
    const field = new THREE.Mesh(fieldGeometry, fieldMaterial);
    field.position.y = -0.5; // cho sân hơi thấp dưới trục
    scene.add(field);

    // Vạch kẻ sân (dùng plane trong suốt có vạch trắng)
    const lineMaterial = new THREE.LineBasicMaterial({color: 0xffffff});
    
    function createLine(x1, z1, x2, z2) {
      const points = [];
      points.push(new THREE.Vector3(x1, 0.01, z1));
      points.push(new THREE.Vector3(x2, 0.01, z2));
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      return new THREE.Line(geometry, lineMaterial);
    }

    // Vạch giữa sân
    const midLine = createLine(-35, 0, 35, 0);
    scene.add(midLine);

    // Vòng tròn giữa sân (dùng CircleGeometry)
    const circleGeometry = new THREE.CircleGeometry(7, 32);
    const circleMaterial = new THREE.MeshBasicMaterial({color: 0xffffff, side: THREE.DoubleSide});
    const circle = new THREE.Mesh(circleGeometry, circleMaterial);
    circle.rotation.x = Math.PI / 2;
    circle.position.y = 0.02;
    scene.add(circle);

    // Biên sân (vạch dài 2 bên)
    const leftLine = createLine(-35, -20, 35, -20);
    const rightLine = createLine(-35, 20, 35, 20);
    scene.add(leftLine);
    scene.add(rightLine);

    // Vạch 16m50
    const line1 = createLine(-35, -10, -25, -10);
    const line2 = createLine(-35, 10, -25, 10);
    const line3 = createLine(35, -10, 25, -10);
    const line4 = createLine(35, 10, 25, 10);
    scene.add(line1);
    scene.add(line2);
    scene.add(line3);
    scene.add(line4);

    // Quả bóng (hình cầu nhỏ màu trắng đen)
    const ballGeometry = new THREE.SphereGeometry(1.5, 32, 32);
    const ballMaterial = new THREE.MeshPhongMaterial({color: 0xffffff});
    const ball = new THREE.Mesh(ballGeometry, ballMaterial);
    ball.position.set(0, 1.5, 0);
    scene.add(ball);

    // Animation: quả bóng quay nhẹ
    function animate() {
      requestAnimationFrame(animate);
      ball.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
