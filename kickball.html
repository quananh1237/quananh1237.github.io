<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Bóng Đá Mini</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }

    .joystick-container {
      position: absolute;
      bottom: 80px;
      left: 40px;
      width: 100px;
      height: 100px;
      background: rgba(0,0,0,0.3);
      border-radius: 50%;
      touch-action: none;
    }

    .joystick {
      width: 60px;
      height: 60px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 20px;
      left: 20px;
      touch-action: none;
    }

    .buttons {
      position: absolute;
      bottom: 40px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .buttons button {
      width: 80px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background-color: #444;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .buttons button:active {
      background-color: #222;
    }
  </style>
</head>
<body>
<div class="joystick-container" id="joystick-container">
  <div class="joystick" id="joystick"></div>
</div>

<div class="buttons">
  <button id="shoot">Shoot</button>
  <button id="pass">Pass</button>
  <button id="speed">Speed</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(50, 50, 50).normalize();
  scene.add(light);

  const field = new THREE.Mesh(new THREE.PlaneGeometry(100, 60), new THREE.MeshPhongMaterial({color: 0x228B22}));
  field.rotation.x = -Math.PI / 2;
  scene.add(field);

  const goalMaterial = new THREE.MeshBasicMaterial({color: 0xffffff});
  const goalGeometry = new THREE.BoxGeometry(1, 5, 10);
  const goalLeft = new THREE.Mesh(goalGeometry, goalMaterial);
  goalLeft.position.set(-50, 2.5, 0);
  scene.add(goalLeft);
  const goalRight = new THREE.Mesh(goalGeometry, goalMaterial);
  goalRight.position.set(50, 2.5, 0);
  scene.add(goalRight);

  const player = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4, 32), new THREE.MeshPhongMaterial({color: 0xff0000}));
  player.position.set(0, 2, 0);
  scene.add(player);

  const ball = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshPhongMaterial({color: 0xffffff}));
  ball.position.set(5, 1, 0);
  scene.add(ball);

  // Vòng xanh dưới chân
  const ringGeometry = new THREE.RingGeometry(1.5, 2, 32);
  const ringMaterial = new THREE.MeshBasicMaterial({color: 0x00ff00, side: THREE.DoubleSide});
  const ring = new THREE.Mesh(ringGeometry, ringMaterial);
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);
  ring.visible = false;

  camera.position.set(0, 50, 80);
  camera.lookAt(0, 0, 0);

  // Joystick logic
  let joystick = document.getElementById("joystick");
  let container = document.getElementById("joystick-container");
  let isDragging = false, speed = 0.5;
  let dirX = 0, dirZ = 0;

  container.addEventListener("touchstart", (e) => {
    isDragging = true;
  });
  container.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if (isDragging) {
      const rect = container.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left - 50;
      const y = touch.clientY - rect.top - 50;
      const max = 30;
      const dx = Math.max(-max, Math.min(max, x));
      const dy = Math.max(-max, Math.min(max, y));
      joystick.style.left = `${20 + dx}px`;
      joystick.style.top = `${20 + dy}px`;

      dirX = dx / max;
      dirZ = dy / max;
    }
  });

  container.addEventListener("touchend", () => {
    isDragging = false;
    joystick.style.left = "20px";
    joystick.style.top = "20px";
    dirX = 0;
    dirZ = 0;
  });

  document.getElementById("shoot").addEventListener("click", () => {
    const dir = new THREE.Vector3().subVectors(ball.position, player.position).normalize();
    ball.position.add(dir.multiplyScalar(5));
  });

  document.getElementById("pass").addEventListener("click", () => {
    const dir = new THREE.Vector3().subVectors(ball.position, player.position).normalize();
    ball.position.add(dir.multiplyScalar(2));
  });

  document.getElementById("speed").addEventListener("click", () => {
    speed = speed === 0.5 ? 1.5 : 0.5;
  });

  function animate() {
    requestAnimationFrame(animate);

    // Di chuyển cầu thủ theo hướng joystick
    player.position.x += dirX * speed;
    player.position.z += dirZ * speed;

    // Kiểm tra gần bóng
    const dist = player.position.distanceTo(ball.position);
    ring.position.set(player.position.x, 0.1, player.position.z);
    ring.visible = dist < 3;

    // Nếu trong vùng gần bóng, bóng đi theo
    if (dist < 3) {
      ball.position.x = player.position.x;
      ball.position.z = player.position.z + 2;
    }

    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
