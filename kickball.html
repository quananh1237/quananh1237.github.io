<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Bóng Đá Mini</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }

    .joystick-container {
      position: absolute;
      bottom: 80px;
      left: 40px;
      width: 100px;
      height: 100px;
      background: rgba(0,0,0,0.3);
      border-radius: 50%;
      touch-action: none;
    }

    .joystick {
      width: 60px;
      height: 60px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 20px;
      left: 20px;
      touch-action: none;
    }

    .buttons {
      position: absolute;
      bottom: 40px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .buttons button {
      width: 80px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background-color: #444;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .buttons button:active {
      background-color: #222;
    }
  </style>
</head>
<body>
<div class="joystick-container" id="joystick-container">
  <div class="joystick" id="joystick"></div>
</div>

<div class="buttons">
  <button id="shoot">Shoot</button>
  <button id="pass">Pass</button>
  <button id="speed">Speed</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(50, 50, 50).normalize();
  scene.add(light);

  const field = new THREE.Mesh(new THREE.PlaneGeometry(100, 60), new THREE.MeshPhongMaterial({color: 0x228B22}));
  field.rotation.x = -Math.PI / 2;
  scene.add(field);

  // Viền trắng chia sân và vòng giữa
  const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
  const fieldLines = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.1, -30), new THREE.Vector3(0, 0.1, 30)
  ]);
  const midLine = new THREE.Line(fieldLines, lineMaterial);
  scene.add(midLine);

  const circleGeometry = new THREE.RingGeometry(7.9, 8, 64);
  const circleMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
  const centerCircle = new THREE.Mesh(circleGeometry, circleMaterial);
  centerCircle.rotation.x = -Math.PI / 2;
  scene.add(centerCircle);

  const centerDot = new THREE.Mesh(new THREE.CircleGeometry(0.3, 16), new THREE.MeshBasicMaterial({ color: 0xffffff }));
  centerDot.rotation.x = -Math.PI / 2;
  centerDot.position.y = 0.1;
  scene.add(centerDot);

  // Vùng cấm địa
  const boxGeometry = new THREE.PlaneGeometry(16, 30);
  const boxMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
  const leftBox = new THREE.Mesh(boxGeometry, boxMaterial);
  leftBox.rotation.x = -Math.PI / 2;
  leftBox.position.set(-42, 0.05, 0);
  scene.add(leftBox);
  const rightBox = leftBox.clone();
  rightBox.position.x = 42;
  scene.add(rightBox);

  // Gôn có lưới (dạng khung)
  function createGoal(x) {
    const postMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const post1 = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 1), postMat);
    const post2 = post1.clone();
    const crossbar = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 10), postMat);
    post1.position.set(x, 2.5, -5);
    post2.position.set(x, 2.5, 5);
    crossbar.position.set(x, 5, 0);
    scene.add(post1, post2, crossbar);
  }
  createGoal(-49.5);
  createGoal(49.5);

  // Rào chắn
  const wallMaterial = new THREE.MeshBasicMaterial({color: 0x888888, opacity: 0.3, transparent: true});
  const walls = [
    new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 60), wallMaterial),
    new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 60), wallMaterial),
    new THREE.Mesh(new THREE.BoxGeometry(100, 5, 0.5), wallMaterial),
    new THREE.Mesh(new THREE.BoxGeometry(100, 5, 0.5), wallMaterial)
  ];
  walls[0].position.set(-50.25, 2.5, 0);
  walls[1].position.set(50.25, 2.5, 0);
  walls[2].position.set(0, 2.5, -30.25);
  walls[3].position.set(0, 2.5, 30.25);
  walls.forEach(w => scene.add(w));

  // Cầu thủ
  const player = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4, 32), new THREE.MeshPhongMaterial({color: 0xff0000}));
  player.position.set(0, 2, 0);
  scene.add(player);

  const ball = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshPhongMaterial({color: 0xffffff}));
  ball.position.set(5, 1, 0);
  scene.add(ball);

  const ringGeometry = new THREE.RingGeometry(1.5, 2, 32);
  const ringMaterial = new THREE.MeshBasicMaterial({color: 0x00ff00, side: THREE.DoubleSide});
  const ring = new THREE.Mesh(ringGeometry, ringMaterial);
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);
  ring.visible = false;

  camera.position.set(0, 50, 80);
  camera.lookAt(0, 0, 0);

  // Joystick logic
  let joystick = document.getElementById("joystick");
  let container = document.getElementById("joystick-container");
  let isDragging = false, speed = 0.5;
  let dirX = 0, dirZ = 0;

  container.addEventListener("touchstart", (e) => { isDragging = true; });
  container.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if (isDragging) {
      const rect = container.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left - 50;
      const y = touch.clientY - rect.top - 50;
      const max = 30;
      const dx = Math.max(-max, Math.min(max, x));
      const dy = Math.max(-max, Math.min(max, y));
      joystick.style.left = `${20 + dx}px`;
      joystick.style.top = `${20 + dy}px`;

      dirX = dx / max;
      dirZ = dy / max;
    }
  });
  container.addEventListener("touchend", () => {
    isDragging = false;
    joystick.style.left = "20px";
    joystick.style.top = "20px";
    dirX = 0;
    dirZ = 0;
  });

  let ballVelocity = new THREE.Vector3(0, 0, 0);

  document.getElementById("shoot").addEventListener("click", () => {
    const angle = player.rotation.y;
    ballVelocity.set(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(1.5);
  });

  document.getElementById("pass").addEventListener("click", () => {
    const angle = player.rotation.y;
    ballVelocity.set(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(0.7);
  });

  document.getElementById("speed").addEventListener("click", () => {
    speed = speed === 0.5 ? 1.5 : 0.5;
  });

  function animate() {
    requestAnimationFrame(animate);

    // Di chuyển cầu thủ
    if (dirX !== 0 || dirZ !== 0) {
      player.position.x += dirX * speed;
      player.position.z += dirZ * speed;
      const angle = Math.atan2(dirX, dirZ);
      player.rotation.y = angle;
    }

    // Giới hạn cầu thủ trong sân
    player.position.x = Math.max(-49, Math.min(49, player.position.x));
    player.position.z = Math.max(-29, Math.min(29, player.position.z));

    // Cập nhật bóng
    if (ballVelocity.length() > 0.01) {
      ball.position.add(ballVelocity);
      ballVelocity.multiplyScalar(0.96);
    }

    if (ballVelocity.length() < 0.05) ballVelocity.set(0, 0, 0);

    // Bóng không tụt xuống
    if (ball.position.y < 1) ball.position.y = 1;

    // Cầu thủ gần bóng thì lấy bóng
    const dist = player.position.distanceTo(ball.position);
    ring.position.set(player.position.x, 0.1, player.position.z);
    ring.visible = dist < 3;

    if (dist < 3 && ballVelocity.length() === 0) {
      ball.position.x = player.position.x + Math.sin(player.rotation.y) * 2;
      ball.position.z = player.position.z + Math.cos(player.rotation.y) * 2;
    }

    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
