<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Sân bóng 3D đơn giản</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/controls/OrbitControls.js"></script>
  <script>
    // Scene, camera, renderer
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // trời xanh nhạt

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 1000);
    camera.position.set(0, 150, 200);

    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Controls để xoay zoom sân
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.update();

    // Ánh sáng
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(100, 200, 100);
    scene.add(directionalLight);

    // Mặt sân bóng (hình chữ nhật)
    const fieldWidth = 120;
    const fieldHeight = 80;

    const fieldGeometry = new THREE.PlaneGeometry(fieldWidth, fieldHeight);
    const fieldMaterial = new THREE.MeshPhongMaterial({color: 0x007a0d});
    const field = new THREE.Mesh(fieldGeometry, fieldMaterial);
    field.rotation.x = -Math.PI / 2; // xoay ngang
    scene.add(field);

    // Vạch sân (dùng các đường line)
    const lineMaterial = new THREE.LineBasicMaterial({color: 0xffffff, linewidth: 2});
    const linePoints = [];

    // Đường biên ngoài
    linePoints.push(new THREE.Vector3(-fieldWidth/2, 0.1, -fieldHeight/2));
    linePoints.push(new THREE.Vector3(fieldWidth/2, 0.1, -fieldHeight/2));
    linePoints.push(new THREE.Vector3(fieldWidth/2, 0.1, fieldHeight/2));
    linePoints.push(new THREE.Vector3(-fieldWidth/2, 0.1, fieldHeight/2));
    linePoints.push(new THREE.Vector3(-fieldWidth/2, 0.1, -fieldHeight/2));

    // Đường giữa sân
    linePoints.push(new THREE.Vector3(0, 0.1, -fieldHeight/2));
    linePoints.push(new THREE.Vector3(0, 0.1, fieldHeight/2));

    // Tạo line
    const lineGeometry = new THREE.BufferGeometry().setFromPoints(linePoints);
    const lines = new THREE.Line(lineGeometry, lineMaterial);
    scene.add(lines);

    // Vòng tròn giữa sân
    const circleRadius = 10;
    const circleSegments = 64;
    const circleGeometry = new THREE.CircleGeometry(circleRadius, circleSegments);
    // Xóa mặt trong, chỉ giữ viền
    circleGeometry.vertices.shift();
    const circleMaterial = new THREE.LineBasicMaterial({color: 0xffffff});
    const circle = new THREE.LineLoop(circleGeometry, circleMaterial);
    circle.rotation.x = -Math.PI / 2;
    circle.position.y = 0.1;
    scene.add(circle);

    // Hàm render
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Resize window
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
