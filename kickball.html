<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sân Bóng Có Điều Khiển</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      z-index: 1;
    }
    .controls button {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      background-color: #444;
      color: white;
      cursor: pointer;
    }
    .controls button:active {
      background-color: #222;
    }
  </style>
</head>
<body>
<div class="controls">
  <button id="left">⬅️</button>
  <button id="right">➡️</button>
  <button id="up">⬆️</button>
  <button id="down">⬇️</button>
