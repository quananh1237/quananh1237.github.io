<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Game Sút Bóng</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #a8d0e6;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .banner {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-bottom: 5px solid white;
    }

    #score {
      color: white;
      font-size: 24px;
      margin: 10px;
    }

    #gameCanvas {
      background: green;
      display: block;
      margin: auto;
      border: 4px solid white;
    }
  </style>
</head>
<body>
  <!-- Ảnh banner -->
  <img src="https://hoanghamobile.com/tin-tuc/wp-content/uploads/2024/05/da-bong-online-16.jpg" alt="Banner Game" class="banner">

  <!-- Hiển thị điểm -->
  <div id="score">Ghi bàn: 0</div>

  <!-- Sân game -->
  <canvas id="gameCanvas" width="400" height="600"></canvas>

  <!-- Âm thanh sút bóng -->
  <audio id="kick-sound" src="https://freesound.org/data/previews/341/341695_3248244-lq.mp3"></audio>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const kickSound = document.getElementById("kick-sound");

    let ball = { x: 200, y: 500, radius: 15, dy: 0, shot: false };
    const goal = { x: 150, y: 50, width: 100, height: 20 };
    let score = 0;

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();
      ctx.closePath();
    }

    function drawGoal() {
      ctx.fillStyle = "yellow";
      ctx.fillRect(goal.x, goal.y, goal.width, goal.height);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawGoal();
      drawBall();

      if (ball.shot) {
        ball.y += ball.dy;
        if (ball.y <= goal.y + goal.height &&
            ball.x > goal.x && ball.x < goal.x + goal.width) {
          score++;
          document.getElementById("score").innerText = "Ghi bàn: " + score;
          resetBall();
        } else if (ball.y < 0) {
          resetBall();
        }
      }

      requestAnimationFrame(draw);
    }

    function resetBall() {
      ball.y = 500;
      ball.dy = 0;
      ball.shot = false;
    }

    canvas.addEventListener("click", () => {
      if (!ball.shot) {
        ball.dy = -5;
        ball.shot = true;
        kickSound.currentTime = 0;
        kickSound.play(); // Phát âm thanh
      }
    });

    draw();
  </script>
</body>
</html>
