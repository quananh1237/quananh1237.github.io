<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bindz - Premium Interface</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Background Decor (Tạo chiều sâu cho Z-index) */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 102, 255, 0.2);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 1;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10; /* Z-index mạnh để nổi lên trên */
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 450px;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #888;
            margin-bottom: 30px;
        }

        /* Start Button Custom */
        .btn-start {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 114, 255, 0.5);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        /* Loading Section (Hidden by default) */
        #loading-section {
            display: none;
            margin-top: 20px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            box-shadow: 0 0 15px #00c6ff;
            transition: width 0.1s linear;
        }

        .percentage {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00c6ff;
        }

        /* Hiệu ứng mờ dần khi hoàn tất */
        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container" id="main-card">
        <div id="welcome-content">
            <h1>Welcome to Bindz</h1>
            <p>Trải nghiệm giao diện Premium thế hệ mới</p>
            <button class="btn-start" onclick="startLoading()">Bắt đầu ngay</button>
        </div>

        <div id="loading-section">
            <p style="margin-bottom: 10px; color: #fff;">Đang khởi tạo hệ thống...</p>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="percentage" id="percent-text">0%</div>
        </div>
    </div>

    <script>
        function startLoading() {
            const welcomeContent = document.getElementById('welcome-content');
            const loadingSection = document.getElementById('loading-section');
            const progressBar = document.getElementById('progress-bar');
            const percentText = document.getElementById('percent-text');
            const mainCard = document.getElementById('main-card');

            // Ẩn nút Start
            welcomeContent.style.display = 'none';
            // Hiện thanh loading
            loadingSection.style.display = 'block';

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    percentText.innerText = "Hoàn tất!";
                    
                    // Hiệu ứng kết thúc "Xịn"
                    setTimeout(() => {
                        mainCard.classList.add('fade-out');
                        alert("Chào mừng bạn đến với Bindz Pro!");
                    }, 500);
                } else {
                    // Random tốc độ loading cho cảm giác thực tế
                    width += Math.floor(Math.random() * 3) + 1;
                    if (width > 100) width = 100;
                    
                    progressBar.style.width = width + '%';
                    percentText.innerText = width + '%';
                }
            }, 50); // Tốc độ cập nhật
        }
    </script>
</body>
</html>
