<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield Pro - Advanced Web Scanner</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --accent-cyan: #00d4ff;
            --accent-purple: #b347ea;
            --accent-green: #00ff88;
            --accent-red: #ff4757;
            --accent-yellow: #ffa502;
            --text-primary: #e0e0e0;
            --text-secondary: #8888aa;
            --border: #2a2a3a;
            --glass: rgba(18, 18, 30, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 15s ease-in-out infinite;
            opacity: 0.3;
        }

        .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--accent-purple);
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            width: 300px;
            height: 300px;
            background: var(--accent-cyan);
            top: 50%;
            right: 10%;
            animation-delay: -5s;
        }

        .orb:nth-child(3) {
            width: 350px;
            height: 350px;
            background: #1a3a5c;
            bottom: 10%;
            left: 40%;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(50px, -30px) scale(1.1);
            }
            50% {
                transform: translate(-30px, 20px) scale(0.9);
            }
            75% {
                transform: translate(20px, 40px) scale(1.05);
            }
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Glass Card */
        .cyber-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 212, 255, 0.08);
            animation: cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: logoPulse 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        @keyframes logoPulse {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 50px rgba(179, 71, 234, 0.5);
            }
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Login Form */
        .login-section {
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            padding-left: 45px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.15);
            background: var(--bg-card);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            bottom: 16px;
            font-size: 18px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .input-field:focus~.input-icon,
        .input-group:focus-within .input-icon {
            color: var(--accent-cyan);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.3);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: rotate(45deg);
            animation: btnShine 3s infinite;
        }

        @keyframes btnShine {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        /* Scanner Section */
        .scanner-section {
            border-top: 1px solid var(--border);
            padding-top: 25px;
            margin-top: 10px;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: dotBlink 1s infinite;
        }

        @keyframes dotBlink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .url-input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .url-input {
            flex: 1;
            padding: 13px 18px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .url-input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 20px rgba(179, 71, 234, 0.2);
        }

        .scan-btn {
            padding: 13px 25px;
            background: var(--accent-green);
            border: none;
            border-radius: 14px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .scan-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            transform: scale(1.03);
        }

        .scan-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Progress Bar */
        .scan-progress {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 15px 0;
            overflow: hidden;
            display: none;
        }

        .scan-progress.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green));
            border-radius: 2px;
            width: 0%;
            animation: progressAnim 2s ease-in-out forwards;
        }

        @keyframes progressAnim {
            0% {
                width: 0%;
            }
            30% {
                width: 40%;
            }
            60% {
                width: 75%;
            }
            100% {
                width: 100%;
            }
        }

        /* Results */
        .results-container {
            display: none;
            margin-top: 20px;
            animation: fadeInUp 0.5s ease;
        }

        .results-container.active {
            display: block;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s;
        }

        .result-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .result-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .result-icon.safe {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-green);
        }
        .result-icon.warning {
            background: rgba(255, 165, 2, 0.15);
            color: var(--accent-yellow);
        }
        .result-icon.danger {
            background: rgba(255, 71, 87, 0.15);
            color: var(--accent-red);
        }

        .result-info h4 {
            font-size: 14px;
            margin-bottom: 3px;
        }
        .result-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-left: auto;
        }

        .status-badge.blocked {
            background: rgba(255, 71, 87, 0.2);
            color: var(--accent-red);
        }
        .status-badge.passed {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent-green);
        }
        .status-badge.scanning {
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent-cyan);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Preview Frame */
        .preview-frame {
            width: 100%;
            height: 300px;
            border: 2px solid var(--border);
            border-radius: 14px;
            margin-top: 15px;
            background: #000;
            display: none;
            overflow: hidden;
        }

        .preview-frame.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        .preview-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--accent-green);
            border-radius: 12px;
            padding: 16px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInRight 0.5s ease, fadeOut 0.5s ease 2.5s forwards;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(120%);
            }
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .cyber-card {
                padding: 25px;
                border-radius: 18px;
            }
            .url-input-wrapper {
                flex-direction: column;
            }
            .logo-text {
                font-size: 22px;
            }
            .result-card {
                flex-wrap: wrap;
            }
            .status-badge {
                margin-left: 0;
                margin-top: 8px;
            }
        }

        /* Glitch Text Effect */
        .glitch {
            position: relative;
        }
        .glitch:hover {
            animation: glitch 0.3s ease;
        }
        @keyframes glitch {
            0% {
                transform: translate(2px, -2px);
            }
            25% {
                transform: translate(-2px, 2px);
            }
            50% {
                transform: translate(1px, 1px);
            }
            75% {
                transform: translate(-1px, -1px);
            }
            100% {
                transform: translate(0, 0);
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="grid-bg"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer"></div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="cyber-card">
            <!-- Header -->
            <div class="header">
                <div class="logo-container">
                    <div class="logo-icon">🛡️</div>
                    <span class="logo-text glitch">CyberShield Pro</span>
                </div>
                <p class="subtitle">Advanced Web Security Scanner</p>
            </div>

            <!-- Login Section -->
            <div class="login-section" id="loginSection">
                <div class="input-group">
                    <label>Email / Username</label>
                    <input type="text" class="input-field" id="username" placeholder="nhập tài khoản...">
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" class="input-field" id="password" placeholder="••••••••">
                    <span class="input-icon">🔒</span>
                </div>
                <button class="login-btn" onclick="handleLogin()">
                    <span id="loginBtnText">Đăng Nhập</span>
                </button>
            </div>

            <!-- Scanner Section (Hidden until login) -->
            <div class="scanner-section" id="scannerSection" style="display:none;">
                <div class="section-title">
                    <span class="dot"></span> URL Scanner & Ad Blocker
                </div>
                <div class="url-input-wrapper">
                    <input type="url" class="url-input" id="urlInput"
                    placeholder="Nhập URL cần quét... (vd: https://example.com)">
                    <button class="scan-btn" id="scanBtn" onclick="startScan()">
                        🔍 Quét Ngay
                    </button>
                </div>

                <!-- Progress -->
                <div class="scan-progress" id="scanProgress">
                    <div class="progress-fill"></div>
                </div>

                <!-- Results -->
                <div class="results-container" id="resultsContainer"></div>

                <!-- Preview Frame -->
                <div class="preview-frame" id="previewFrame">
                    <iframe id="previewIframe" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>

                <!-- Logout -->
                <button class="login-btn" style="margin-top:20px; background: var(--accent-red);" onclick="handleLogout()">
                    Đăng Xuất
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============ PARTICLE SYSTEM ============
        function createParticles() {
            const container = document.querySelector('.bg-animation');
            const colors = ['#00d4ff', '#b347ea', '#00ff88', '#ffa502', '#ff6b81'];

            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 10 + 8 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.boxShadow = `0 0 ${size * 2}px ${particle.style.background}`;
                container.appendChild(particle);
            }
        }
        createParticles();

        // ============ NOTIFICATION SYSTEM ============
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = 'notification';
            const icons = { success: '✅', warning: '⚠️', error: '❌', info: 'ℹ️' };
            notification.innerHTML = `
                <span style="font-size:20px">${icons[type] || icons.info}</span>
                <span style="font-size:14px; font-weight:500">${message}</span>
            `;
            container.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // ============ LOGIN SYSTEM ============
        // Demo credentials
        const DEMO_CREDENTIALS = {
            username: 'admin',
            password: 'cybershield2024'
        };

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const btnText = document.getElementById('loginBtnText');

            if (!username || !password) {
                showNotification('Vui lòng nhập đầy đủ thông tin!', 'warning');
                // Shake animation
                const card = document.querySelector('.cyber-card');
                card.style.animation = 'none';
                card.offsetHeight;
                card.style.animation = 'cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                return;
            }

            // Simulate loading
            btnText.innerHTML = '<span class="spinner"></span> Đang xác thực...';
            const loginBtn = document.querySelector('.login-btn');
            loginBtn.disabled = true;

            setTimeout(() => {
                if (username === DEMO_CREDENTIALS.username && password === DEMO_CREDENTIALS.password) {
                    // Success
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('scannerSection').style.display = 'block';
                    showNotification('Đăng nhập thành công! Hệ thống đã sẵn sàng.', 'success');

                    // Store session
                    sessionStorage.setItem('cybershield_logged_in', 'true');
                    sessionStorage.setItem('cybershield_user', username);
                } else {
                    showNotification('Sai tài khoản hoặc mật khẩu! (Demo: admin / cybershield2024)', 'error');
                }

                btnText.textContent = 'Đăng Nhập';
                loginBtn.disabled = false;
            }, 1500);
        }

        function handleLogout() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('scannerSection').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('urlInput').value = '';
            document.getElementById('resultsContainer').classList.remove('active');
            document.getElementById('resultsContainer').innerHTML = '';
            document.getElementById('previewFrame').classList.remove('active');
            document.getElementById('scanProgress').classList.remove('active');
            sessionStorage.clear();
            showNotification('Đã đăng xuất!', 'info');
        }

        // Check session on load
        window.addEventListener('load', () => {
            if (sessionStorage.getItem('cybershield_logged_in') === 'true') {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('scannerSection').style.display = 'block';
            }
        });

        // Enter key for login
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('loginSection').style.display !== 'none') {
                handleLogin();
            }
            if (e.key === 'Enter' && document.getElementById('scannerSection').style.display !== 'none' &&
                document.activeElement === document.getElementById('urlInput')) {
                startScan();
            }
        });

        // ============ ADVANCED SCANNER SYSTEM ============
        // Simulated API endpoints
        const SCANNER_APIS = {
            adDetector: 'https://api.cybershield.io/v2/ad-detect',
            antiVpnBypass: 'https://api.cybershield.io/v2/vpn-bypass',
            deepScan: 'https://api.cybershield.io/v2/deep-scan',
            malwareCheck: 'https://api.cybershield.io/v2/malware',
            trackerList: 'https://api.cybershield.io/v2/trackers',
            chromeExtension: 'chrome-extension://cybershield/scan'
        };

        // Known ad domains for simulation
        const KNOWN_AD_DOMAINS = [
            'doubleclick.net', 'googlesyndication.com', 'googleadservices.com',
            'adservice.google.com', 'adnxs.com', 'rubiconproject.com',
            'openx.net', 'pubmatic.com', 'criteo.com', 'adsrvr.org',
            'ads.facebook.com', 'ads.twitter.com', 'taboola.com',
            'outbrain.com', 'revcontent.com', 'mgid.com'
        ];

        // Known anti-VPN patterns
        const ANTI_VPN_PATTERNS = [
            'vpn-detection', 'proxy-check', 'geo-block', 'ip-verification',
            'datacenter-ip', 'hosting-ip', 'anonymous-proxy', 'tor-exit'
        ];

        async function startScan() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            const scanBtn = document.getElementById('scanBtn');
            const progressBar = document.getElementById('scanProgress');
            const resultsContainer = document.getElementById('resultsContainer');
            const previewFrame = document.getElementById('previewFrame');

            if (!url) {
                showNotification('Vui lòng nhập URL!', 'warning');
                urlInput.focus();
                return;
            }

            // Validate URL
            let targetUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                targetUrl = 'https://' + url;
            }

            try {
                new URL(targetUrl);
            } catch (e) {
                showNotification('URL không hợp lệ!', 'error');
                return;
            }

            // Start scanning
            scanBtn.disabled = true;
            scanBtn.innerHTML = '<span class="spinner"></span> Đang quét...';
            progressBar.classList.add('active');
            resultsContainer.classList.remove('active');
            resultsContainer.innerHTML = '';
            previewFrame.classList.remove('active');

            // Reset progress animation
            const progressFill = progressBar.querySelector('.progress-fill');
            progressFill.style.animation = 'none';
            progressFill.offsetHeight;
            progressFill.style.animation = 'progressAnim 3s ease-in-out forwards';

            // Show initial scanning status
            resultsContainer.classList.add('active');
            resultsContainer.innerHTML = `
                <div class="result-card">
                    <div class="result-icon" style="background:rgba(0,212,255,0.15); color:#00d4ff;">🔍</div>
                    <div class="result-info">
                        <h4>Đang phân tích URL...</h4>
                        <p>${targetUrl}</p>
                    </div>
                    <span class="status-badge scanning">SCANNING</span>
                </div>
            `;

            // Simulate scanning process with multiple API calls
            await simulateScan(targetUrl, resultsContainer);

            // Show preview
            setTimeout(() => {
                previewFrame.classList.add('active');
                document.getElementById('previewIframe').src = targetUrl;
            }, 500);

            // Reset button
            setTimeout(() => {
                scanBtn.disabled = false;
                scanBtn.innerHTML = '🔍 Quét Ngay';
                progressBar.classList.remove('active');
                showNotification('Quét hoàn tất! Hệ thống đã chặn quảng cáo và bypass anti-VPN.', 'success');
            }, 3200);
        }

        async function simulateScan(url, container) {
            const domain = new URL(url).hostname.replace('www.', '');

            // Simulate API calls
            await sleep(800);

            // AD Detection Result
            const adDetected = KNOWN_AD_DOMAINS.some(ad => domain.includes(ad) || url.includes(ad));
            const adCount = Math.floor(Math.random() * 15) + (adDetected ? 5 : 0);
            const adsBlocked = adCount;

            // Anti-VPN Detection
            const hasAntiVpn = ANTI_VPN_PATTERNS.some(pattern =>
                domain.includes(pattern) || Math.random() > 0.7
            );
            const vpnBypassed = hasAntiVpn;

            // Deep Scan Results
            const trackers = Math.floor(Math.random() * 20) + 3;
            const scripts = Math.floor(Math.random() * 50) + 10;
            const cookies = Math.floor(Math.random() * 30) + 5;

            await sleep(1200);

            // Update results
            container.innerHTML = `
                <div class="result-card">
                    <div class="result-icon danger">🛑</div>
                    <div class="result-info">
                        <h4>Phát Hiện & Chặn Quảng Cáo</h4>
                        <p>Đã phát hiện <strong>${adCount}</strong> quảng cáo • Đã chặn <strong>${adsBlocked}</strong></p>
                        <p style="font-size:11px; color:#ff4757;">Nguồn quảng cáo chính: ${adDetected ? domain : 'Không xác định'}</p>
                    </div>
                    <span class="status-badge blocked">ĐÃ CHẶN</span>
                </div>

                <div class="result-card">
                    <div class="result-icon ${vpnBypassed ? 'safe' : 'warning'}">🔓</div>
                    <div class="result-info">
                        <h4>Bypass Anti-VPN</h4>
                        <p>${vpnBypassed ? 'Đã phát hiện và vô hiệu hóa hệ thống chặn VPN!' : 'Không phát hiện anti-VPN'}</p>
                        <p style="font-size:11px;">Phương thức: ${vpnBypassed ? 'IP Rotation + Header Spoofing' : 'N/A'}</p>
                    </div>
                    <span class="status-badge ${vpnBypassed ? 'passed' : 'passed'}">${vpnBypassed ? 'ĐÃ BYPASS' : 'AN TOÀN'}</span>
                </div>

                <div class="result-card">
                    <div class="result-icon safe">🛡️</div>
                    <div class="result-info">
                        <h4>Quét Sâu Bảo Mật</h4>
                        <p>Tracker: <strong>${trackers}</strong> • Scripts: <strong>${scripts}</strong> • Cookies: <strong>${cookies}</strong></p>
                        <p style="font-size:11px; color:#00ff88;">API: ${Object.keys(SCANNER_APIS).length} endpoints đã quét</p>
                    </div>
                    <span class="status-badge passed">HOÀN TẤT</span>
                </div>

                <div class="result-card">
                    <div class="result-icon safe">🔗</div>
                    <div class="result-info">
                        <h4>Kết Nối Chrome Extension</h4>
                        <p>Đã đồng bộ với extension • Trạng thái: <span style="color:#00ff88;">Active</span></p>
                        <p style="font-size:11px;">ID: chrome-extension://cybershield/scan</p>
                    </div>
                    <span class="status-badge passed">CONNECTED</span>
                </div>
            `;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ============ INITIALIZATION ============
        console.log('%c🛡️ CyberShield Pro %cĐã khởi tạo',
            'color: #00d4ff; font-size: 20px; font-weight: bold;',
            'color: #8888aa;');
        console.log('%c🔗 Chrome Extension API: %cchrome-extension://cybershield/scan',
            'color: #b347ea;', 'color: #00ff88;');
        console.log('%c👤 Demo Login: %cadmin / cybershield2024',
            'color: #ffa502;', 'color: #e0e0e0;');
        console.log('%c📡 Connected APIs: %c' + Object.keys(SCANNER_APIS).length + ' endpoints',
            'color: #00d4ff;', 'color: #e0e0e0;');
    </script>
</body>
</html>
