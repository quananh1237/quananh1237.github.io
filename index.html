<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Roblox Piano Composer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #2ecc71; margin-bottom: 10px; }
        #drop-area { border: 2px dashed #444; padding: 30px; margin: 20px 0; border-radius: 15px; transition: 0.3s; cursor: pointer; }
        #drop-area:hover { border-color: #2ecc71; background: #252525; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button:active { transform: scale(0.98); }
        textarea { width: 100%; height: 180px; margin-top: 20px; background: #000; color: #00ff00; border: 1px solid #444; border-radius: 10px; padding: 12px; font-family: monospace; box-sizing: border-box; }
        .status { margin-top: 10px; font-size: 14px; color: #aaa; }
        img#preview { max-width: 100%; margin-top: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>AI Piano Scanner</h2>
    <p>Tải ảnh sheet nhạc lên để AI tự dịch sang phím</p>

    <div id="drop-area" onclick="document.getElementById('fileElem').click()">
        <p id="file-text">Kéo thả hoặc chạm để chọn ảnh</p>
        <input type="file" id="fileElem" accept="image/*" style="display:none" onchange="previewImage(this.files)">
        <img id="preview">
    </div>

    <button onclick="processMusic()">PHÂN TÍCH NHẠC</button>
    <div id="status" class="status">Sẵn sàng...</div>

    <textarea id="output" placeholder="Kết quả script sẽ hiện ở đây..."></textarea>
    
    <button style="background: #3498db; margin-top: 10px;" onclick="copyResult()">COPY SCRIPT</button>
</div>

<script>
    // API Key của bạn đã được dán vào đây
    const MY_API_KEY = "AIzaSyBnd4NXs-Ne3n3CMYp5tQQCHi5VkhCuq-A";

    function previewImage(files) {
        const file = files[0];
        if (file) {
            document.getElementById('file-text').style.display = 'none';
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    }

    async function processMusic() {
        const fileInput = document.getElementById('fileElem');
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        if (fileInput.files.length === 0) {
            alert("Vui lòng chọn ảnh trước!");
            return;
        }

        status.innerText = "Đang quét ảnh bằng AI...";
        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onloadend = async () => {
            const base64Image = reader.result.replace('data:', '').replace(/^.+,/, '');
            
            try {
                const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${MY_API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        requests: [{
                            image: { content: base64Image },
                            features: [{ type: 'TEXT_DETECTION' }]
                        }]
                    })
                });

                const data = await response.json();
                const detectedText = data.responses[0].fullTextAnnotation.text;
                
                // Thuật toán chuyển đổi nốt nhạc cơ bản dựa trên sheet nhạc của bạn
                let result = convertToPianoScript(detectedText);
                output.value = result;
                status.innerText = "Hoàn tất!";
            } catch (error) {
                status.innerText = "Lỗi: Kiểm tra lại API Key hoặc mạng.";
                console.error(error);
            }
        };
        reader.readAsDataURL(file);
    }

    function convertToPianoScript(text) {
        // Mapping nốt nhạc sang phím Roblox (Dựa trên sheet Fa Trưởng của bạn)
        let map = {
            'C': 't', 'D': 'y', 'E': 'u', 'F': 'i', 'G': 'o', 'A': 'p', 'B': 'j',
            'c': 't', 'd': 'y', 'e': 'u', 'f': 'i', 'g': 'o', 'a': 'p', 'b': 'j',
            '1': 't', '2': 'y', '3': 'u', '4': 'i', '5': 'o'
        };

        let raw = text.split('').map(char => map[char] || '').join('');
        
        // Tạo chuỗi nhịp nghỉ tự động ####
        let finalScript = "";
        for(let i=0; i < raw.length; i++) {
            finalScript += raw[i] + "#### ";
        }

        return finalScript || "AI không tìm thấy ký tự nhạc cụ thể. Hãy thử ảnh rõ nét hơn!";
    }

    function copyResult() {
        const output = document.getElementById('output');
        output.select();
        document.execCommand('copy');
        alert("Đã copy chuỗi nhạc!");
    }
</script>

</body>
</html>
