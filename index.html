<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Bindz Pro | Web Game Source Explorer</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Highlight.js cho code syntax -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <!-- tsParticles cho background particles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
  <!-- GSAP cho animation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }
    #tsparticles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    /* Intro overlay */
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .intro-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 700;
      background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 25px rgba(168,85,247,0.6));
      opacity: 0;
      transform: scale(0.7);
    }
    .intro-sub {
      font-size: 1.2rem;
      color: #94a3b8;
      letter-spacing: 0.3em;
      margin-top: 1rem;
      opacity: 0;
    }
    /* Main container */
    .main-container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 1000px;
      margin: 2rem auto;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .glass-panel {
      background: rgba(15, 15, 25, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 2.5rem;
    }
    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(to right, #c084fc, #818cf8, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .brand-tagline {
      color: #64748b;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .input-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .url-input {
      flex: 1 1 300px;
      background: rgba(10, 10, 20, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      color: #e2e8f0;
      outline: none;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      backdrop-filter: blur(10px);
    }
    .url-input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 20px rgba(168,85,247,0.3);
    }
    .url-input::placeholder {
      color: #475569;
    }
    .btn-search {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 1.5rem;
      padding: 1rem 2.2rem;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: 0.02em;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(124,58,237,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
    }
    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(124,58,237,0.6);
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
    }
    .btn-search:active {
      transform: translateY(0);
      box-shadow: 0 5px 15px rgba(124,58,237,0.5);
    }
    .btn-search i {
      font-size: 1.1rem;
    }
    /* Loading */
    .loader {
      display: none;
      margin: 2rem auto 0;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Results area */
    .results-container {
      margin-top: 2rem;
      display: none;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .file-list {
      max-height: 450px;
      overflow-y: auto;
      padding-right: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .file-item {
      background: rgba(20, 20, 35, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 1.2rem;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .file-item:hover {
      background: rgba(45, 45, 70, 0.7);
      border-color: rgba(168,85,247,0.3);
      transform: translateX(5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .file-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #cbd5e1;
      font-size: 0.95rem;
      word-break: break-all;
    }
    .file-info i {
      color: #a78bfa;
      font-size: 1.2rem;
      width: 24px;
      text-align: center;
    }
    .file-actions {
      display: flex;
      gap: 0.5rem;
    }
    .icon-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      border-radius: 0.8rem;
      padding: 0.5rem 0.7rem;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    .icon-btn:hover {
      background: rgba(168,85,247,0.2);
      color: #d8b4fe;
    }
    /* Code modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-content {
      background: rgba(15,15,25,0.9);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2rem;
      width: 100%;
      max-width: 900px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .modal-header h3 {
      color: #e2e8f0;
      font-weight: 500;
      font-size: 1.1rem;
      word-break: break-all;
    }
    .modal-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .modal-close:hover { color: #f87171; }
    .code-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      position: relative;
    }
    .code-wrapper pre {
      margin: 0;
      border-radius: 1rem;
      font-size: 0.9rem;
      background: #0b0b15 !important;
    }
    .copy-btn-modal {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 0.7rem;
      padding: 0.4rem 0.9rem;
      color: #cbd5e1;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: 0.2s;
      z-index: 10;
    }
    .copy-btn-modal:hover {
      background: rgba(168,85,247,0.3);
      color: white;
    }
    .empty-message {
      color: #64748b;
      text-align: center;
      padding: 2rem;
      font-style: italic;
    }
    /* scrollbar */
    .file-list::-webkit-scrollbar, .code-wrapper::-webkit-scrollbar {
      width: 5px;
    }
    .file-list::-webkit-scrollbar-track, .code-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }
    .file-list::-webkit-scrollbar-thumb, .code-wrapper::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 10px;
    }
    @media (max-width: 640px) {
      .glass-panel { padding: 1.5rem; }
      .brand { font-size: 2rem; }
      .btn-search { padding: 0.9rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="tsparticles"></div>

  <!-- INTRO OVERLAY -->
  <div id="intro-overlay">
    <div class="intro-logo" id="intro-logo">Bindz Pro</div>
    <div class="intro-sub" id="intro-sub">WEB SOURCE EXPLORER</div>
  </div>

  <!-- MAIN APP -->
  <div class="main-container" id="main-container">
    <div class="glass-panel">
      <div class="brand">Bindz Pro</div>
      <div class="brand-tagline">✦ Game Web File Explorer ✦</div>
      
      <div class="input-group">
        <input type="url" class="url-input" id="urlInput" placeholder="Nhập URL game web (vd: https://example.com/game)" autocomplete="off">
        <button class="btn-search" id="searchBtn"><i class="fas fa-search"></i> Start Search</button>
      </div>
      
      <div class="loader" id="loader"></div>
      
      <div class="results-container" id="resultsContainer">
        <div class="stats">
          <span id="fileCount">0 files found</span>
          <span style="color:#6366f1;"><i class="fas fa-shield-alt"></i> Ads/Cloudflare filtered</span>
        </div>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>
  </div>

  <!-- CODE MODAL -->
  <div class="modal-overlay" id="codeModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalFileName">file.js</h3>
        <button class="modal-close" id="closeModalBtn"><i class="fas fa-times"></i></button>
      </div>
      <div class="code-wrapper" id="codeWrapper">
        <button class="copy-btn-modal" id="copyCodeBtn"><i class="far fa-copy"></i> Copy</button>
        <pre><code id="codeDisplay" class="language-javascript"></code></pre>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    (function() {
      // ---------- PARTICLES BACKGROUND ----------
      tsParticles.load("tsparticles", {
        fullScreen: { enable: false },
        background: { color: "#0a0a0f" },
        particles: {
          number: { value: 60, density: { enable: true, area: 800 } },
          color: { value: ["#a855f7", "#6366f1", "#3b82f6"] },
          shape: { type: "circle" },
          opacity: { value: 0.25, random: true },
          size: { value: 2.5, random: true },
          links: { enable: true, distance: 140, color: "#4f46e5", opacity: 0.15, width: 1 },
          move: { enable: true, speed: 0.8, direction: "none", random: true, outModes: "out" }
        },
        interactivity: {
          events: { onHover: { enable: true, mode: "repulse" } },
          modes: { repulse: { distance: 100 } }
        }
      });

      // ---------- INTRO ANIMATION ----------
      const introOverlay = document.getElementById('intro-overlay');
      const introLogo = document.getElementById('intro-logo');
      const introSub = document.getElementById('intro-sub');
      const mainContainer = document.getElementById('main-container');

      const tl = gsap.timeline();
      tl.to(introLogo, { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.7)" })
        .to(introSub, { opacity: 1, duration: 0.6 }, "-=0.3")
        .to({}, { duration: 0.5 }) // pause
        .to(introOverlay, { opacity: 0, duration: 0.7, ease: "power2.inOut", onComplete: () => {
          introOverlay.style.visibility = 'hidden';
          gsap.to(mainContainer, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" });
        }});

      // ---------- DOM ELEMENTS ----------
      const urlInput = document.getElementById('urlInput');
      const searchBtn = document.getElementById('searchBtn');
      const loader = document.getElementById('loader');
      const resultsContainer = document.getElementById('resultsContainer');
      const fileList = document.getElementById('fileList');
      const fileCountSpan = document.getElementById('fileCount');
      const codeModal = document.getElementById('codeModal');
      const modalFileName = document.getElementById('modalFileName');
      const codeDisplay = document.getElementById('codeDisplay');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const copyCodeBtn = document.getElementById('copyCodeBtn');
      const codeWrapper = document.getElementById('codeWrapper');

      // Danh sách file đã fetch (để xem code)
      let fetchedFiles = []; // { url, content, type }

      // ---------- FILTER OUT ADS & CLOUDFLARE ----------
      function isBlockedDomain(url) {
        const blocked = [
          'cloudflare', 'cloudflareinsights', 'googleadservices', 'doubleclick',
          'googlesyndication', 'adservice', 'adsystem', 'adnxs', 'criteo',
          'facebook.com/tr', 'analytics', 'gtag', 'hotjar', 'clarity.ms',
          'pagead', 'adsbygoogle', 'adroll', 'outbrain', 'taboola'
        ];
        return blocked.some(domain => url.toLowerCase().includes(domain));
      }

      // ---------- FETCH & PARSE FILES ----------
      async function searchFiles(url) {
        // Sử dụng proxy allorigins để bypass CORS
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        try {
          const response = await fetch(proxyUrl);
          if (!response.ok) throw new Error('Network response was not ok');
          const html = await response.text();
          
          // Parse HTML để lấy script src và link href
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          
          const files = [];
          
          // Scripts
          doc.querySelectorAll('script[src]').forEach(script => {
            let src = script.getAttribute('src');
            if (src) {
              // Resolve relative URLs
              try {
                src = new URL(src, url).href;
              } catch (e) { /* keep original */ }
              if (!isBlockedDomain(src)) {
                files.push({ url: src, type: 'script' });
              }
            }
          });
          
          // Stylesheets
          doc.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
            let href = link.getAttribute('href');
            if (href) {
              try {
                href = new URL(href, url).href;
              } catch (e) {}
              if (!isBlockedDomain(href)) {
                files.push({ url: href, type: 'stylesheet' });
              }
            }
          });

          // Cũng có thể thêm các file khác như json, wasm nếu tìm thấy trong src attribute khác
          return files;
        } catch (error) {
          console.error('Fetch error:', error);
          throw error;
        }
      }

      // ---------- FETCH CONTENT OF A FILE ----------
      async function fetchFileContent(fileUrl) {
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(fileUrl)}`;
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error('Cannot fetch file');
        return await response.text();
      }

      // ---------- RENDER FILE LIST ----------
      function renderFileList(files) {
        fileList.innerHTML = '';
        if (files.length === 0) {
          fileList.innerHTML = '<div class="empty-message"><i class="far fa-folder-open"></i> Không tìm thấy file nào (đã lọc quảng cáo & cloudflare).</div>';
          fileCountSpan.textContent = '0 files found';
          return;
        }
        fileCountSpan.textContent = `${files.length} files found`;
        
        files.forEach((file, index) => {
          const fileItem = document.createElement('div');
          fileItem.className = 'file-item';
          const icon = file.type === 'script' ? 'fa-file-code' : 'fa-file-css';
          const typeLabel = file.type === 'script' ? 'JS' : 'CSS';
          
          fileItem.innerHTML = `
            <div class="file-info">
              <i class="fas ${icon}"></i>
              <span>${file.url.split('/').pop() || file.url}</span>
              <span style="color:#64748b; font-size:0.75rem; background:rgba(255,255,255,0.05); padding:0.2rem 0.5rem; border-radius:2rem;">${typeLabel}</span>
            </div>
            <div class="file-actions">
              <button class="icon-btn view-code-btn" data-index="${index}" title="Xem code"><i class="fas fa-code"></i></button>
            </div>
          `;
          fileList.appendChild(fileItem);
        });

        // Attach sự kiện view code
        document.querySelectorAll('.view-code-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const index = btn.getAttribute('data-index');
            const file = files[index];
            if (!file) return;
            openCodeModal(file);
          });
        });
      }

      // ---------- OPEN CODE MODAL ----------
      async function openCodeModal(file) {
        modalFileName.textContent = file.url.split('/').pop() || file.url;
        codeDisplay.textContent = '// Đang tải code...';
        codeDisplay.className = 'language-javascript';
        codeModal.style.display = 'flex';
        
        try {
          const content = await fetchFileContent(file.url);
          codeDisplay.textContent = content;
          // Xác định ngôn ngữ cho highlight
          if (file.type === 'stylesheet') {
            codeDisplay.className = 'language-css';
          } else {
            codeDisplay.className = 'language-javascript';
          }
          // Lưu lại content để copy
          codeDisplay.setAttribute('data-content', content);
          // Highlight
          hljs.highlightElement(codeDisplay);
        } catch (err) {
          codeDisplay.textContent = '// Không thể tải nội dung file (có thể bị chặn CORS hoặc file không tồn tại).';
          codeDisplay.className = 'language-javascript';
          codeDisplay.setAttribute('data-content', '');
        }
      }

      // ---------- CLOSE MODAL ----------
      function closeModal() {
        codeModal.style.display = 'none';
        codeDisplay.textContent = '';
      }

      closeModalBtn.addEventListener('click', closeModal);
      codeModal.addEventListener('click', (e) => {
        if (e.target === codeModal) closeModal();
      });

      // ---------- COPY CODE ----------
      copyCodeBtn.addEventListener('click', () => {
        const content = codeDisplay.getAttribute('data-content') || codeDisplay.textContent;
        if (!content || content.startsWith('// Đang tải')) {
          alert('Không có code để copy.');
          return;
        }
        navigator.clipboard.writeText(content).then(() => {
          copyCodeBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
          setTimeout(() => {
            copyCodeBtn.innerHTML = '<i class="far fa-copy"></i> Copy';
          }, 2000);
        }).catch(() => {
          alert('Copy thất bại, vui lòng thử lại.');
        });
      });

      // ---------- SEARCH HANDLER ----------
      searchBtn.addEventListener('click', async () => {
        let rawUrl = urlInput.value.trim();
        if (!rawUrl) {
          alert('Vui lòng nhập URL game web.');
          return;
        }
        // Tự động thêm https:// nếu thiếu
        if (!/^https?:\/\//i.test(rawUrl)) {
          rawUrl = 'https://' + rawUrl;
          urlInput.value = rawUrl;
        }
        
        // Reset UI
        resultsContainer.style.display = 'none';
        fileList.innerHTML = '';
        loader.style.display = 'block';
        searchBtn.disabled = true;
        searchBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Searching...';
        
        try {
          const files = await searchFiles(rawUrl);
          fetchedFiles = files;
          renderFileList(files);
          resultsContainer.style.display = 'block';
        } catch (error) {
          fileList.innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Không thể truy cập URL. Có thể trang bị chặn hoặc proxy lỗi. Thử lại sau.</div>';
          fileCountSpan.textContent = '0 files found';
          resultsContainer.style.display = 'block';
        } finally {
          loader.style.display = 'none';
          searchBtn.disabled = false;
          searchBtn.innerHTML = '<i class="fas fa-search"></i> Start Search';
        }
      });

      // Cho phép nhấn Enter để search
      urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchBtn.click();
      });

      // Thêm một vài URL mẫu để test nhanh (click để điền)
      console.log('✨ Bindz Pro ready! Hãy thử URL: https://example.com hoặc một game web tĩnh.');
    })();
  </script>
</body>
</html>
