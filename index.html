<!DOCTYPE html>
<html>
<head>
    <title>Bindz Menu - Get Key</title>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding-top: 100px; }
        .key-container { border: 2px solid #ff0000; display: inline-block; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px #ff0000; }
        #key-display { font-size: 25px; color: #00ff00; margin: 20px 0; font-weight: bold; letter-spacing: 2px; }
        button { background: #ff0000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:disabled { background: #444; }
    </style>
</head>
<body>
    <div class="key-container">
        <h1>BINDZ MENU FF KEY</h1>
        <p id="timer-msg">Vui lòng chờ <span id="time">10</span>s...</p>
        <button id="get-btn" disabled onclick="getKey()">LẤY KEY</button>
        <div id="key-display"></div>
    </div>

    <script>
        let count = 10;
        // Thuật toán tạo ký tự ABCD ngẫu nhiên nhưng đồng bộ với Script
        function generateRandomString() {
            const step = Math.floor(Date.now() / 300000); // 5 phút
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let result = "";
            // Dùng step làm seed đơn giản
            let seed = step * 12345;
            for (let i = 0; i < 4; i++) {
                seed = (seed * 9301 + 49297) % 233280;
                result += chars.charAt(seed % chars.length);
            }
            return "Bindz-Menu-" + result;
        }

        const timer = setInterval(() => {
            count--;
            document.getElementById('time').innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                document.getElementById('timer-msg').innerText = "Sẵn sàng!";
                document.getElementById('get-btn').disabled = false;
            }
        }, 1000);

        function getKey() {
            const key = generateRandomString();
            document.getElementById('key-display').innerText = key;
            localStorage.setItem("saved_key", key);
            localStorage.setItem("saved_step", Math.floor(Date.now() / 300000));
        }

        // Reset trang không mất key
        window.onload = () => {
            const sk = localStorage.getItem("saved_key");
            const ss = localStorage.getItem("saved_step");
            if (sk && ss == Math.floor(Date.now() / 300000)) {
                document.getElementById('key-display').innerText = sk;
                document.getElementById('get-btn').style.display = "none";
                document.getElementById('timer-msg').innerText = "Key còn hiệu lực!";
            }
        }
    </script>
</body>
</html>
