<!DOCTYPE html>
<html>
<head>
  <title>Super Liquid Soccer Clone</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
    #scoreboard {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.5); color: white; padding: 10px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="scoreboard">Team A 0 - 0 Team B</div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script>
    // Khởi tạo Three.js
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // Sân
    const field = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 50),
      new THREE.MeshBasicMaterial({ color: 0x228B22 })
    );
    field.rotation.x = -Math.PI / 2;
    scene.add(field);

    // Bóng
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    ball.position.set(0, 0.5, 0);
    scene.add(ball);

    // Cầu thủ
    const player = new THREE.Mesh(
      new THREE.BoxGeometry(1, 2, 1),
      new THREE.MeshBasicMaterial({ color: 0xff0000 })
    );
    player.position.set(-10, 1, 0);
    scene.add(player);

    // Camera
    camera.position.set(0, 30, 30);
    camera.lookAt(0, 0, 0);

    // Điều khiển đơn giản
    const keys = {};
    document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function animate() {
      requestAnimationFrame(animate);
      
      // Di chuyển cầu thủ
      if (keys['w']) player.position.z -= 0.3;
      if (keys['s']) player.position.z += 0.3;
      if (keys['a']) player.position.x -= 0.3;
      if (keys['d']) player.position.x += 0.3;

      // Sút bóng khi nhấn J
      if (keys['j']) {
        const dx = ball.position.x - player.position.x;
        const dz = ball.position.z - player.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if (dist < 2) {
          ball.position.x += dx * 0.5;
          ball.position.z += dz * 0.5;
        }
      }

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
