<!DOCTYPE html>
<html>
<head>
    <title>Thí nghiệm Nhiệt năng iOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #status { font-weight: bold; color: red; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Thí nghiệm Stress Test CPU</h2>
    <p>Trạng thái: <span id="status">Đang dừng</span></p>
    <button id="startBtn">Bắt đầu làm nóng</button>
    <button id="stopBtn">Dừng lại</button>

    <script>
        let workers = [];

        document.getElementById('startBtn').onclick = function() {
            document.getElementById('status').innerText = "Đang chạy (Cảnh báo: Máy sẽ nóng)";
            
            // Tạo nhiều Web Workers để tận dụng đa nhân CPU
            const workerCode = `
                while (true) {
                    Math.sqrt(Math.random() * Math.random());
                }
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);

            // Chạy khoảng 8-12 luồng cùng lúc
            for (let i = 0; i < navigator.hardwareConcurrency || 8; i++) {
                let w = new Worker(workerUrl);
                workers.push(w);
            }
        };

        document.getElementById('stopBtn').onclick = function() {
            workers.forEach(w => w.terminate());
            workers = [];
            document.getElementById('status').innerText = "Đang dừng";
        };
    </script>
</body>
</html>
