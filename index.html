<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINDZ WORKSPACE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 m-0 p-0">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Định nghĩa các hàm phụ trợ chuyển đổi byte cho Hex Editor chống lỗi
        const byteToHex = (b) => b.toString(16).toUpperCase().padStart(2, '0');
        const byteToAscii = (b) => (b >= 32 && b <= 126) ? String.fromCharCode(b) : '.';
        const formatTime = (secs) => {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        };

        const injectGoogleFont = () => {
          if (typeof document !== 'undefined' && !document.getElementById('premium-font')) {
            const link = document.createElement('link');
            link.id = 'premium-font';
            link.rel = 'stylesheet';
            link.href = 'https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&family=Fira+Code:wght@400;500;600&display=swap';
            document.head.appendChild(link);
          }
        };

        function App() {
          // --- State của Hệ thống Key ---
          const [keyInput, setKeyInput] = useState('');
          const [isAuthorized, setIsAuthorized] = useState(false);
          const [isLoading, setIsLoading] = useState(false);
          const [serverStatus, setServerStatus] = useState('online');
          const [serverUrl, setServerUrl] = useState('http://127.0.0.1:8080');
          const [customServerActive, setCustomServerActive] = useState(false);
          const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
          const [timeLeft, setTimeLeft] = useState(18000);
          const [activeKey, setActiveKey] = useState('');

          // --- Chuyển đổi giữa các tab công cụ ---
          const [activeTab, setActiveTab] = useState('dump');

          // --- State của Trình Phân tích Dump.cs ---
          const [dumpFile, setDumpFile] = useState(null);
          const [systemLogs, setSystemLogs] = useState([]);
          const [parsedClasses, setParsedClasses] = useState([]);
          const [selectedClass, setSelectedClass] = useState(null);
          const [searchKeyword, setSearchKeyword] = useState('Player, Weapon, Enemy');
          const [customFilter, setCustomFilter] = useState('');
          const [isStrictMatch, setIsStrictMatch] = useState(false);
          const [detectedOffsets, setDetectedOffsets] = useState([]);
          const [copiedId, setCopiedId] = useState(null); 
          const [copiedAll, setCopiedAll] = useState(false); 
          const [copiedHook, setCopiedHook] = useState(false); 

          // --- State của Trình Hex Editor libil2cpp.so ---
          const [soFile, setSoFile] = useState(null);
          const [soBuffer, setSoBuffer] = useState(null); 
          const [hexOffsetInput, setHexOffsetInput] = useState('0x1000'); 
          const [currentHexOffset, setCurrentHexOffset] = useState(0x1000); 
          const [patchOffsetInput, setPatchOffsetInput] = useState('0x1000'); 
          const [patchHexInput, setPatchHexInput] = useState('00 00 A0 E3'); 
          const [hexViewBytes, setHexViewBytes] = useState([]); 

          const validTestKeys = ['Bindz-ABU82', 'Bindz-Nakro22', 'Bindz-Nalekow92'];

          const canvasRef = useRef(null);
          const fileInputRef = useRef(null);
          const soFileInputRef = useRef(null);
          const logContainerRef = useRef(null); 

          const hackPatterns = [
            { key: 'Speed', label: 'Tốc độ (Speed)', keywords: ['speed', 'movespeed', 'runspeed', 'velocity', 'walkspeed'] },
            { key: 'Jump', label: 'Nhảy cao (Jump)', keywords: ['jump', 'jumpforce', 'jumphieght', 'gravity', 'airjump'] },
            { key: 'HP', label: 'Máu/Giáp (HP/Health)', keywords: ['hp', 'health', 'maxhealth', 'armor', 'shield', 'godmode'] },
            { key: 'Damage', label: 'Sát thương (Damage)', keywords: ['damage', 'dmg', 'hitdamage', 'attack', 'power', 'crit'] },
            { key: 'Ammo', label: 'Đạn dược (Ammo)', keywords: ['ammo', 'clip', 'bullet', 'mag', 'magazine', 'reload'] },
            { key: 'Gold/Gem', label: 'Tiền/Vàng (Money)', keywords: ['gold', 'coin', 'gem', 'diamond', 'money', 'cash', 'point'] }
          ];

          const addLog = (message, type = 'info') => {
            const time = new Date().toLocaleTimeString();
            setSystemLogs((prev) => [...prev, { id: Date.now() + Math.random(), time, message, type }]);
          };

          useEffect(() => {
            if (logContainerRef.current) {
              logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
            }
          }, [systemLogs]);

          useEffect(() => {
            injectGoogleFont();
            addLog("Hệ thống bảo mật BINDZ khởi tạo thành công.", "success");
            addLog("Bộ phân tích an toàn không gây sập màn hình đã được vá.", "info");

            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            const resizeCanvas = () => {
              canvas.width = window.innerWidth;
              canvas.height = window.innerHeight;
            };
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            const numFlakes = 75;
            const flakes = Array.from({ length: numFlakes }, () => ({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              r: Math.random() * 2.2 + 1,
              d: Math.random() * numFlakes,
              speed: Math.random() * 0.9 + 0.3,
              opacity: Math.random() * 0.4 + 0.2,
              swing: Math.random() * 1.0 - 0.5,
            }));

            const draw = () => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              flakes.forEach((f) => {
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
                ctx.fillStyle = `rgba(255, 255, 255, ${f.opacity})`;
                ctx.fill();

                f.y += f.speed;
                f.x += Math.sin(f.y / 25) * f.swing;

                if (f.y > canvas.height) {
                  f.y = -10;
                  f.x = Math.random() * canvas.width;
                }
                if (f.x > canvas.width) f.x = 0;
                else if (f.x < 0) f.x = canvas.width;
              });

              animationFrameId = requestAnimationFrame(draw);
            };

            draw();

            return () => {
              window.removeEventListener('resize', resizeCanvas);
              cancelAnimationFrame(animationFrameId);
            };
          }, []);

          useEffect(() => {
            const interval = setInterval(() => {
              const isOnline = Math.random() > 0.05;
              setServerStatus(isOnline ? 'online' : 'offline');
            }, 30000);
            return () => clearInterval(interval);
          }, []);

          useEffect(() => {
            if (!isAuthorized) return;
            const timer = setInterval(() => {
              setTimeLeft((prev) => (prev > 0 ? prev - 1 : 0));
            }, 1000);
            return () => clearInterval(timer);
          }, [isAuthorized]);

          useEffect(() => {
            if (!soBuffer) return;
            const viewSize = 256; 
            const start = Math.max(0, Math.min(currentHexOffset, soBuffer.length - viewSize));
            const end = Math.min(start + viewSize, soBuffer.length);
            
            const bytes = [];
            for (let i = start; i < end; i++) {
              bytes.push({ offset: i, val: soBuffer[i] });
            }
            setHexViewBytes(bytes);
          }, [soBuffer, currentHexOffset]);

          useEffect(() => {
            if (!selectedClass || !selectedClass.members) {
              setDetectedOffsets([]);
              return;
            }

            const detected = [];
            addLog(`Đang quét chỉ số tự động trong class: ${selectedClass.name}`, 'info');

            selectedClass.members.forEach(member => {
              if (!member || !member.content) return;
              const content = member.content;
              const cleanContent = content.replace(/\/\/.*$/, '').trim();
              const isMethod = content.includes('RVA:') || content.includes('Offset:') || content.includes('VA:');
              
              let targetAddress = null;
              let addressType = 'Struct Offset';

              if (isMethod) {
                const offsetMatch = content.match(/Offset:\s*(0x[0-9A-Fa-f]+)/i);
                if (offsetMatch) {
                  targetAddress = offsetMatch[1];
                  addressType = 'File Offset';
                }
              } else {
                const fieldOffsetMatch = content.match(/\/\/\s*(0x[0-9A-Fa-f]+)/);
                if (fieldOffsetMatch) {
                  targetAddress = fieldOffsetMatch[1];
                  addressType = 'Struct Offset';
                }
              }

              if (!targetAddress) return; 

              hackPatterns.forEach(pattern => {
                const matches = pattern.keywords.some(kw => {
                  const regex = new RegExp(`\\b${kw}\\b|${kw}`, 'i');
                  return regex.test(cleanContent);
                });

                if (matches) {
                  let memberName = cleanContent.split(/\s+/).pop().replace(';', '');
                  if (memberName.includes('(')) {
                    memberName = memberName.split('(')[0] + '()';
                  }

                  detected.push({
                    id: member.id,
                    category: pattern.label,
                    memberName: memberName,
                    address: targetAddress,
                    addressType: addressType,
                    rawLine: content,
                    lineNum: member.lineNum
                  });
                }
              });
            });

            setDetectedOffsets(detected);
          }, [selectedClass]);

          const showToast = (message, type = 'success') => {
            setToast({ show: true, message, type });
            addLog(`[Thông báo] ${message}`, type === 'success' ? 'success' : 'error');
            setTimeout(() => { setToast({ show: false, message: '', type }); }, 4000);
          };

          const forceCopyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.top = "0px"; textArea.style.left = "0px";
            textArea.style.width = "2em"; textArea.style.height = "2em";
            textArea.style.padding = "0"; border = "none"; outline = "none";
            document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            let isSuccessful = false;
            try { isSuccessful = document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
            return isSuccessful;
          };

          const handleCopySingle = (text, id) => {
            const cleanText = text.replace(/^\s*\/\/.*$/gm, '').trim(); 
            if (forceCopyToClipboard(cleanText)) {
              setCopiedId(id);
              addLog(`Đã copy dòng: "${cleanText}"`, "success");
              setTimeout(() => setCopiedId(null), 1500);
            } else { showToast('Lỗi sao chép!', 'error'); }
          };

          const handleCopyAllMembers = () => {
            if (!selectedClass) return;
            const fullClassCode = `${selectedClass.declaration}\n{\n${selectedClass.members.map(m => `  ${m.content}`).join('\n')}\n}`;
            if (forceCopyToClipboard(fullClassCode)) {
              setCopiedAll(true);
              showToast(`Đã copy class ${selectedClass.name}!`, 'success');
              setTimeout(() => setCopiedAll(false), 2000);
            } else { showToast('Không thể copy class!', 'error'); }
          };

          const handleCopyHookGame = () => {
            if (parsedClasses.length === 0) {
              showToast('Chưa có dữ liệu dump nào được import!', 'error');
              return;
            }
            const targetKeywords = searchKeyword.split(',').map(k => k.trim().toLowerCase()).filter(k => k.length > 0);
            const matchedClasses = parsedClasses.filter(cls => {
              if (!cls || !cls.name) return false;
              const cleanClassName = cls.name.split('.').pop().toLowerCase();
              return targetKeywords.some(kw => isStrictMatch ? cleanClassName === kw : cleanClassName.includes(kw));
            });

            if (matchedClasses.length === 0) {
              showToast('Không tìm thấy class nào khớp điều kiện!', 'error'); return;
            }

            let hookOutput = `// ==========================================\n// BINDZ GAME HOOK CORES (AUTO AI GENERATED)\n// ==========================================\n\n`;
            matchedClasses.forEach(cls => {
              hookOutput += `${cls.declaration}\n{\n${cls.members.map(m => `  ${m.content}`).join('\n')}\n}\n\n`;
            });

            if (forceCopyToClipboard(hookOutput)) {
              setCopiedHook(true);
              showToast(`Đã copy thành công ${matchedClasses.length} class!`, 'success');
              setTimeout(() => setCopiedHook(false), 2000);
            }
          };

          const handleCopyHackOffsets = () => {
            if (detectedOffsets.length === 0) { showToast('Không có thông số hack nào!', 'error'); return; }
            let out = `// QUICK HACK OFFSETS\n`;
            detectedOffsets.forEach(o => { out += `const uintptr_t offset_${selectedClass.name}_${o.memberName.replace('()', '')} = ${o.address};\n`; });
            if (forceCopyToClipboard(out)) showToast('Đã copy danh sách offset!', 'success');
          };

          const handleJumpToHexEditor = (address) => {
            if (!soBuffer) { showToast('Vui lòng nạp file .so trước!', 'warning'); return; }
            let offset = address.toLowerCase().startsWith('0x') ? parseInt(address, 16) : parseInt(address, 10);
            if (isNaN(offset) || offset < 0 || offset >= soBuffer.length) return;
            setHexOffsetInput(address); setCurrentHexOffset(offset); setPatchOffsetInput(address); setActiveTab('hex');
          };

          const extractAddressFromLine = (line) => {
            if (!line || !line.includes('Offset:')) return null;
            const m = line.match(/Offset:\s*(0x[0-9A-Fa-f]+)/i);
            return m ? m[1] : null;
          };

          const handleSoFileUpload = (e) => {
            const file = e.target.files[0]; if (!file) return;
            setSoFile(file);
            const reader = new FileReader();
            reader.onload = (event) => { setSoBuffer(new Uint8Array(event.target.result)); addLog("Nạp .so thật thành công!", "success"); };
            reader.readAsArrayBuffer(file);
          };

          const handleLoadMockSoFile = () => {
            const mock = new Uint8Array(1024 * 1024 * 2);
            mock[0] = 0x7F; mock[1] = 0x45; mock[2] = 0x4C; mock[3] = 0x46;
            setSoBuffer(mock); setSoFile({ name: 'libil2cpp_mock.so' });
            showToast("Nạp tệp ảo thành công!", "success");
          };

          const handleGotoOffset = () => {
            let offset = hexOffsetInput.trim().toLowerCase().startsWith('0x') ? parseInt(hexOffsetInput.trim(), 16) : parseInt(hexOffsetInput.trim(), 10);
            if (!isNaN(offset) && offset >= 0 && offset < soBuffer.length) { setCurrentHexOffset(offset); setPatchOffsetInput(hexOffsetInput); }
          };

          const handleSavePatch = () => {
            let offset = patchOffsetInput.trim().toLowerCase().startsWith('0x') ? parseInt(patchOffsetInput.trim(), 16) : parseInt(patchOffsetInput.trim(), 10);
            const bytes = patchHexInput.trim().split(/\s+/).map(h => parseInt(h, 16));
            const updated = new Uint8Array(soBuffer);
            for (let i = 0; i < bytes.length; i++) updated[offset + i] = bytes[i];
            setSoBuffer(updated); showToast("Đã Patch Hex thành công!", "success");
          };

          const handleDownloadPatchedFile = () => {
            const blob = new Blob([soBuffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a'); link.href = url; link.download = `patched_${soFile.name}`;
            link.click();
          };

          const handleCheckKey = async (e) => {
            e.preventDefault();
            if (validTestKeys.includes(keyInput.trim())) {
              setIsAuthorized(true); setActiveKey(keyInput.trim()); showToast('Chào mừng Đại ca Bindz!', 'success');
            } else { showToast('Sai Key rồi đại ca!', 'error'); }
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0]; if (!file) return;
            setDumpFile(file);
            const reader = new FileReader();
            reader.onload = (ev) => parseDumpFile(ev.target.result);
            reader.readAsText(file);
          };

          const parseDumpFile = (text) => {
            const keywords = searchKeyword.split(',').map(k => k.trim().toLowerCase()).filter(k => k.length > 0);
            const lines = text.split('\n'); const detected = []; let current = null;
            for (let i = 0; i < lines.length; i++) {
              const line = lines[i].trim();
              const cm = line.match(/\/\/\s*Class:\s*([\w\.\/<>`\-]+)/i);
              if (cm) {
                const name = cm[1]; const clean = name.split('.').pop().toLowerCase();
                if (keywords.some(k => isStrictMatch ? clean === k : clean.includes(k))) {
                  if (current) detected.push(current);
                  current = { name, lineNum: i + 1, declaration: `public class ${name.split('.').pop()}`, members: [] };
                } else { if (current) detected.push(current); current = null; }
              } else if (current && (line.includes('//') || line.includes('public') || line.includes('private'))) {
                if (line.length > 3 && !line.startsWith('using')) current.members.push({ id: `m-${i}`, lineNum: i + 1, content: line });
              }
            }
            if (current) detected.push(current);
            setParsedClasses(detected); if (detected.length > 0) setSelectedClass(detected[0]);
          };

          return (
            <div className="relative min-h-screen w-full flex items-center justify-center py-10 overflow-x-hidden" style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
              <canvas ref={canvasRef} className="absolute inset-0 pointer-events-none z-10" />
              <div className="absolute top-4 right-4 z-50 flex items-center gap-2">
                <button onClick={() => setCustomServerActive(!customServerActive)} className={`px-3 py-1.5 rounded-full text-xs font-semibold border backdrop-blur-md ${customServerActive ? 'bg-cyan-500/10 border-cyan-500/30 text-cyan-400' : 'bg-slate-900/40 border-slate-800 text-slate-400'}`}>
                  Termux Server: {customServerActive ? 'BẬT' : 'TẮT'}
                </button>
              </div>

              {toast.show && (
                <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-4 rounded-2xl border backdrop-blur-xl shadow-2xl ${toast.type === 'success' ? 'bg-emerald-950/90 border-emerald-500/20 text-emerald-300' : 'bg-rose-950/90 border-rose-500/20 text-rose-300'}`}>
                  <span className="text-sm font-semibold">{toast.message}</span>
                </div>
              )}

              {!isAuthorized ? (
                <div className="relative w-full max-w-[420px] mx-4 z-20 bg-slate-900/60 border border-slate-800/80 rounded-[2.5rem] p-8 backdrop-blur-2xl">
                    <div className="text-center mb-8">
                      <h1 className="text-5xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500 mb-2" style={{ fontFamily: "'Orbitron', sans-serif" }}>BINDZ</h1>
                      <p className="text-slate-400 text-[10px] tracking-widest font-bold uppercase">Hệ Thống Phân Tích Game Modding</p>
                    </div>
                    <form onSubmit={handleCheckKey} className="space-y-6">
                      <input type="text" value={keyInput} onChange={(e) => setKeyInput(e.target.value)} placeholder="Nhập Key Bindz-..." className="w-full bg-slate-950/80 border border-slate-800/80 text-slate-100 px-4 py-4 rounded-2xl text-sm font-mono tracking-widest focus:outline-none focus:border-cyan-500" />
                      <button type="submit" className="w-full py-4 rounded-2xl bg-gradient-to-r from-cyan-500 to-purple-600 font-bold text-sm uppercase text-white">Mở khóa hệ thống</button>
                    </form>
                    <div className="mt-6 pt-4 border-t border-slate-800/50">
                      <p className="text-[11px] font-bold text-slate-500 mb-2">KEY TEST:</p>
                      {validTestKeys.map(k => <div key={k} onClick={() => setKeyInput(k)} className="text-xs font-mono text-slate-400 bg-slate-950/40 p-2 rounded-xl mb-1 cursor-pointer border border-slate-900 hover:text-cyan-400">{k}</div>)}
                    </div>
                </div>
              ) : (
                <div className="relative w-full max-w-[1150px] mx-4 z-20 space-y-6">
                  <div className="flex gap-4 border-b border-slate-800/80 pb-4">
                    <button onClick={() => setActiveTab('dump')} className={`px-6 py-3 rounded-2xl font-bold text-sm uppercase ${activeTab === 'dump' ? 'bg-gradient-to-r from-cyan-500 to-indigo-600 text-white' : 'text-slate-400'}`}>Dump.cs Analyzer</button>
                    <button onClick={() => setActiveTab('hex')} className={`px-6 py-3 rounded-2xl font-bold text-sm uppercase ${activeTab === 'hex' ? 'bg-gradient-to-r from-cyan-500 to-indigo-600 text-white' : 'text-slate-400'}`}>Libil2cpp Hex Editor</button>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-2 bg-slate-900/80 border border-slate-800/80 rounded-[2.5rem] p-6 backdrop-blur-3xl min-h-[500px]">
                      <div className="flex justify-between items-center pb-4 border-b border-slate-800/60 mb-4">
                        <h2 className="text-xl font-bold text-cyan-400" style={{ fontFamily: "'Orbitron', sans-serif" }}>BINDZ WORKSPACE</h2>
                        <span className="text-xs bg-purple-500/10 text-purple-400 border border-purple-500/20 px-3 py-1.5 rounded-xl font-mono">Hạn Key: {formatTime(timeLeft)}</span>
                      </div>

                      {activeTab === 'dump' ? (
                        <div className="space-y-4">
                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-950/50 p-4 rounded-3xl border border-slate-850">
                            <div className="md:col-span-2">
                              <input type="text" value={searchKeyword} onChange={(e) => setSearchKeyword(e.target.value)} className="w-full bg-slate-900 border border-slate-800 px-4 py-2.5 rounded-xl text-xs font-mono text-slate-100 focus:outline-none" />
                            </div>
                            <button onClick={() => fileInputRef.current.click()} className="py-2.5 bg-cyan-500 text-white font-bold rounded-xl text-xs uppercase">Import dump.cs</button>
                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                          </div>

                          {parsedClasses.length > 0 && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                              <div className="bg-slate-950/60 border border-slate-850 rounded-2xl p-3 h-[280px] overflow-y-auto space-y-1">
                                {parsedClasses.map((cls, idx) => (
                                  <button key={idx} onClick={() => setSelectedClass(cls)} className={`w-full text-left px-2 py-2 rounded-lg text-xs font-mono ${selectedClass?.name === cls.name ? 'text-cyan-400 bg-cyan-500/10' : 'text-slate-400'}`}>{cls.name}</button>
                                ))}
                              </div>
                              <div className="md:col-span-2 bg-slate-950/60 border border-slate-850 rounded-2xl p-4 h-[280px] flex flex-col justify-between">
                                {selectedClass && (
                                  <div className="flex flex-col h-full justify-between">
                                    <div className="flex-1 overflow-y-auto space-y-1 font-mono text-xs text-slate-300">
                                      {selectedClass.members.map(m => (
                                        <div key={m.id} className="flex justify-between items-center py-0.5">
                                          <span className="truncate max-w-[80%]">{m.content}</span>
                                          <div className="flex gap-1">
                                            {extractAddressFromLine(m.content) && <button onClick={() => handleJumpToHexEditor(extractAddressFromLine(m.content))} className="px-1.5 py-0.5 text-[10px] bg-cyan-500/20 text-cyan-400 rounded">Goto</button>}
                                            <button onClick={() => handleCopySingle(m.content, m.id)} className="px-1.5 py-0.5 text-[10px] bg-slate-800 text-slate-400 rounded">Copy</button>
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                    <div className="pt-2 flex justify-end gap-2 border-t border-slate-900">
                                      <button onClick={handleCopyHookGame} className="px-3 py-1.5 bg-cyan-500 text-white text-xs font-bold rounded-xl">Copy in Hook Game</button>
                                      <button onClick={handleCopyAllMembers} className="px-3 py-1.5 bg-slate-800 text-slate-300 text-xs font-bold rounded-xl">Copy Toàn Bộ Class</button>
                                    </div>
                                  </div>
                                )}
                              </div>
                            </div>
                          )}
                          {selectedClass && detectedOffsets.length > 0 && (
                            <div className="bg-slate-950/40 border border-slate-850 rounded-2xl p-4">
                              <div className="flex justify-between items-center mb-2"><h3 className="text-xs font-bold text-emerald-400 uppercase font-mono">AI Auto Offset Detect</h3><button onClick={handleCopyHackOffsets} className="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded">Copy Quick Hack</button></div>
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                {detectedOffsets.map((o, idx) => <div key={idx} className="bg-slate-950 p-2 rounded-xl border border-slate-900 flex justify-between text-xs font-mono"><span className="text-slate-400">{o.memberName}</span><span className="text-emerald-400 font-bold">{o.address}</span></div>)}
                              </div>
                            </div>
                          )}
                        </div>
                      ) : (
                        <div className="space-y-4">
                          <div className="flex gap-2 bg-slate-950/50 p-4 rounded-3xl border border-slate-850">
                            <button onClick={() => soFileInputRef.current.click()} className="px-4 py-2 bg-purple-500/20 text-purple-400 text-xs rounded-xl border border-purple-500/30">Nạp .so thật</button>
                            <button onClick={handleLoadMockSoFile} className="px-4 py-2 bg-cyan-500 text-white text-xs rounded-xl">Nạp File Mock Test</button>
                            <input type="file" ref={soFileInputRef} onChange={handleSoFileUpload} className="hidden" />
                          </div>

                          {soBuffer && (
                            <div className="space-y-4">
                              <div className="flex gap-2 bg-slate-950 p-3 rounded-xl border border-slate-900">
                                <input type="text" value={hexOffsetInput} onChange={(e) => setHexOffsetInput(e.target.value)} className="bg-slate-900 px-3 py-1.5 text-xs rounded-lg font-mono focus:outline-none flex-1" />
                                <button onClick={handleGotoOffset} className="bg-cyan-500 px-3 text-xs font-bold text-white rounded-lg">Goto</button>
                              </div>
                              <div className="bg-slate-950 border border-slate-850 rounded-xl p-3 font-mono text-[11px] h-[200px] overflow-y-auto">
                                {Array.from({ length: Math.ceil(hexViewBytes.length / 16) }).map((_, rIdx) => {
                                  const rBytes = hexViewBytes.slice(rIdx * 16, (rIdx + 1) * 16);
                                  return (
                                    <div key={rIdx} className="flex py-0.5">
                                      <span className="text-cyan-500 w-[80px]">0x{rBytes[0].offset.toString(16).toUpperCase()}</span>
                                      <span className="flex-1 text-center text-slate-300">{rBytes.map(b => byteToHex(b.val)).join(' ')}</span>
                                      <span className="text-emerald-500 w-[100px] pl-2">{rBytes.map(b => byteToAscii(b.val)).join('')}</span>
                                    </div>
                                  );
                                })}
                              </div>
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-2 bg-slate-950/50 p-3 rounded-xl border border-slate-850">
                                <input type="text" value={patchOffsetInput} onChange={(e) => setPatchOffsetInput(e.target.value)} className="bg-slate-900 p-2 text-xs rounded-xl font-mono" placeholder="Offset" />
                                <input type="text" value={patchHexInput} onChange={(e) => setPatchHexInput(e.target.value)} className="bg-slate-900 p-2 text-xs rounded-xl font-mono" placeholder="Hex Code" />
                                <div className="flex gap-1"><button onClick={handleSavePatch} className="flex-1 bg-emerald-500 text-white text-xs font-bold rounded-xl">Save</button><button onClick={handleDownloadPatchedFile} className="bg-purple-500/20 text-purple-400 px-2 rounded-xl border border-purple-500/30">▼</button></div>
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>

                    <div className="bg-slate-900/80 border border-slate-800/80 rounded-[2.5rem] p-4 flex flex-col h-[400px] lg:h-auto">
                      <div className="text-xs font-bold uppercase border-b border-slate-800 pb-2 mb-2 text-slate-400">Nhật Ký Hệ Thống</div>
                      <div className="flex-1 overflow-y-auto space-y-1 text-[10px] font-mono text-slate-300">
                        {systemLogs.map(l => <div key={l.id} className="p-1 bg-slate-950/40 border border-slate-900 rounded">[{l.time}] {l.message}</div>)}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
