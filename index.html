<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Football Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    canvas { display: block; }
    #joystick-zone {
      position: absolute; left: 20px; bottom: 20px;
      width: 120px; height: 120px; display: none;
      touch-action: none;
    }
    #joystick-base {
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.1);
      border: 2px solid white; border-radius: 50%;
      position: relative;
    }
    #joystick-stick {
      width: 50px; height: 50px;
      background: white; border-radius: 50%;
      position: absolute; top: 35px; left: 35px;
    }
    #buttons {
      position: absolute; right: 20px; bottom: 20px;
      display: flex; flex-direction: column; gap: 15px;
    }
    .btn-action {
      width: 70px; height: 70px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid white; color: white;
      font-weight: bold; font-size: 18px;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer;
    }
    .btn-action:active {
      background: rgba(255,255,255,0.5);
    }
    iframe#powerbar {
      position: absolute;
      bottom: 110px;
      right: 20px;
      width: 160px;
      height: 20px;
      border: none;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-stick"></div>
    </div>
  </div>
  <div id="buttons">
    <div id="btn-shoot" class="btn-action">Shoot</div>
    <div id="btn-pass" class="btn-action">Pass</div>
    <div id="btn-sprint" class="btn-action">Sprint</div>
  </div>
  <iframe id="powerbar" src="powerbar.html"></iframe>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script>
    const isTouch = 'ontouchstart' in window;
    let joystickVector = { x: 0, y: 0 };
    let shootPower = 0;
    let shootCharging = false;
    let isHoldingBall = false;

    if (isTouch) {
      document.getElementById('joystick-zone').style.display = 'block';
      const base = document.getElementById('joystick-base');
      const stick = document.getElementById('joystick-stick');
      let dragging = false;

      base.addEventListener('touchstart', e => { e.preventDefault(); dragging = true; });
      base.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!dragging) return;
        const rect = base.getBoundingClientRect();
        const touch = e.touches[0];
        const x = touch.clientX - rect.left - rect.width / 2;
        const y = touch.clientY - rect.top - rect.height / 2;
        const maxDist = rect.width / 2;
        const dist = Math.min(Math.sqrt(x * x + y * y), maxDist);
        const angle = Math.atan2(y, x);
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;
        stick.style.left = `${dx + rect.width / 2 - 25}px`;
        stick.style.top = `${dy + rect.height / 2 - 25}px`;
        joystickVector = { x: dx / maxDist, y: dy / maxDist };
      });
      base.addEventListener('touchend', e => {
        e.preventDefault(); dragging = false;
        joystickVector = { x: 0, y: 0 };
        stick.style.left = '35px';
        stick.style.top = '35px';
      });
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Field and lines
    const field = new THREE.Mesh(new THREE.PlaneGeometry(80, 50), new THREE.MeshBasicMaterial({ color: 0x228B22 }));
    field.rotation.x = -Math.PI / 2;
    scene.add(field);

    const linesMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
    const drawLine = (x1, z1, x2, z2) => {
      const geometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x1, 0.01, z1),
        new THREE.Vector3(x2, 0.01, z2)
      ]);
      const line = new THREE.Line(geometry, linesMaterial);
      scene.add(line);
    };
    drawLine(-40, -25, 40, -25); drawLine(40, -25, 40, 25);
    drawLine(40, 25, -40, 25); drawLine(-40, 25, -40, -25);
    drawLine(0, -25, 0, 25);

    // Goal area lines
    drawLine(-40, -10, -35, -10); drawLine(-35, -10, -35, 10); drawLine(-35, 10, -40, 10);
    drawLine(40, -10, 35, -10); drawLine(35, -10, 35, 10); drawLine(35, 10, 40, 10);

    // Walls (leave gap near corner)
    const wallMaterial = new THREE.MeshBasicMaterial({ color: 0x444444 });
    const wallGeo = new THREE.BoxGeometry(1, 2, 50);
    const wall1 = new THREE.Mesh(wallGeo, wallMaterial); wall1.position.set(-40.5, 1, 0); scene.add(wall1);
    const wall2 = new THREE.Mesh(wallGeo, wallMaterial); wall2.position.set(40.5, 1, 0); scene.add(wall2);
    const wall3 = new THREE.Mesh(new THREE.BoxGeometry(70, 2, 1), wallMaterial); wall3.position.set(0, 1, -25.5); scene.add(wall3);
    const wall4 = new THREE.Mesh(new THREE.BoxGeometry(70, 2, 1), wallMaterial); wall4.position.set(0, 1, 25.5); scene.add(wall4);

    // Ball
    const ball = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff }));
    ball.position.set(0, 0.5, 0); scene.add(ball);

    // Player
    const player = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 2, 16), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
    player.position.set(-10, 1, 0); scene.add(player);

    const circle = new THREE.Mesh(new THREE.RingGeometry(0.6, 0.8, 32), new THREE.MeshBasicMaterial({ color: 0x00ccff, side: THREE.DoubleSide }));
    circle.rotation.x = -Math.PI / 2;
    circle.visible = false;
    scene.add(circle);

    // Goals
    const goalMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const goalGeo = new THREE.BoxGeometry(1, 3, 10);
    const goal1 = new THREE.Mesh(goalGeo, goalMat); goal1.position.set(-40.7, 1.5, 0); scene.add(goal1);
    const goal2 = new THREE.Mesh(goalGeo, goalMat); goal2.position.set(40.7, 1.5, 0); scene.add(goal2);

    // Camera setup
    camera.position.set(0, 30, 30); camera.lookAt(0, 0, 0);

    let keys = {};
    document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    let sprinting = false;
    const powerbarFrame = document.getElementById('powerbar').contentWindow;

    function shoot() {
      if (!isHoldingBall) return;
      const dx = Math.cos(-player.rotation.y);
      const dz = Math.sin(-player.rotation.y);
      ball.position.x += dx * (2 + shootPower * 8);
      ball.position.z += dz * (2 + shootPower * 8);
      shootPower = 0;
      isHoldingBall = false;
    }

    function pass() {
      if (!isHoldingBall) return;
      const dx = Math.cos(-player.rotation.y);
      const dz = Math.sin(-player.rotation.y);
      ball.position.x += dx * 2;
      ball.position.z += dz * 2;
      isHoldingBall = false;
    }

    document.getElementById('btn-shoot').addEventListener('touchstart', () => shootCharging = true);
    document.getElementById('btn-shoot').addEventListener('touchend', () => { shoot(); shootCharging = false; });
    document.getElementById('btn-pass').addEventListener('touchstart', pass);
    document.getElementById('btn-sprint').addEventListener('touchstart', () => sprinting = true);
    document.getElementById('btn-sprint').addEventListener('touchend', () => sprinting = false);

    document.getElementById('btn-shoot').addEventListener('mousedown', () => shootCharging = true);
    document.getElementById('btn-shoot').addEventListener('mouseup', () => { shoot(); shootCharging = false; });
    document.getElementById('btn-pass').addEventListener('mousedown', pass);
    document.getElementById('btn-sprint').addEventListener('mousedown', () => sprinting = true);
    document.getElementById('btn-sprint').addEventListener('mouseup', () => sprinting = false);

    function movePlayer() {
      let speed = sprinting ? 0.5 : 0.25;
      let vx = joystickVector.x;
      let vz = joystickVector.y;
      if (keys['w']) vz -= 1;
      if (keys['s']) vz += 1;
      if (keys['a']) vx -= 1;
      if (keys['d']) vx += 1;
      const len = Math.sqrt(vx * vx + vz * vz);
      if (len > 0) {
        vx /= len; vz /= len;
        player.position.x += vx * speed;
        player.position.z += vz * speed;
        const angle = Math.atan2(vz, vx);
        player.rotation.y = -angle;
      }
    }

    function checkBallControl() {
      const dx = ball.position.x - player.position.x;
      const dz = ball.position.z - player.position.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 2) {
        circle.position.set(player.position.x, 0.01, player.position.z);
        circle.visible = true;
        ball.position.x = player.position.x + Math.cos(-player.rotation.y) * 1.2;
        ball.position.z = player.position.z + Math.sin(-player.rotation.y) * 1.2;
        isHoldingBall = true;
      } else {
        circle.visible = false;
        isHoldingBall = false;
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      movePlayer();
      checkBallControl();
      if (shootCharging) shootPower = Math.min(shootPower + 0.01, 1);
      powerbarFrame.postMessage(shootPower, '*');
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
