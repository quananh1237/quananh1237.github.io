<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Game Sút Bóng</title>
  <style>
    body {
      margin: 0;
      background: #a8d0e6;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Menu */
    #menu {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #menu img {
      max-width: 80%;
      border: 5px solid white;
      margin-bottom: 20px;
    }

    #startButton {
      padding: 12px 24px;
      font-size: 20px;
      background-color: yellow;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Game */
    #gameArea {
      display: none;
      text-align: center;
    }

    #score {
      color: white;
      font-size: 24px;
      margin: 10px;
    }

    #gameCanvas {
      background: green;
      display: block;
      margin: auto;
      border: 4px solid white;
    }
  </style>
</head>
<body>

  <!-- Menu mở đầu -->
  <div id="menu">
    <img src="https://i.pinimg.com/736x/0c/55/b4/0c55b4d81eecdd46b6a4ff95d0eeb23c.jpg" alt="Menu Game">
    <button id="startButton">Bắt đầu chơi</button>
  </div>

  <!-- Game -->
  <div id="gameArea">
    <div id="score">Ghi bàn: 0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <audio id="kick-sound" src="https://freesound.org/data/previews/341/341695_3248244-lq.mp3"></audio>
  </
