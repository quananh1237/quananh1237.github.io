<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Analyzer Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Intro Animation */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeOut 0.5s ease-in-out 2.5s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                pointer-events: none;
            }
        }

        .intro-content {
            text-align: center;
            color: white;
        }

        .brain-icon {
            font-size: 100px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .loading-bar {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 20px auto;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            animation: loading 2s ease-in-out forwards;
        }

        @keyframes loading {
            to { width: 100%; }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 3em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.2em;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Upload Section */
        .upload-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .upload-section:hover {
            transform: translateY(-5px);
        }

        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
        }

        .upload-zone:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
        }

        .upload-zone.dragover {
            border-color: #4caf50;
            background: rgba(76,175,80,0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #imagePreview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            animation: zoomIn 0.5s ease-out;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Analysis Section */
        .analysis-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-height: 600px;
            overflow-y: auto;
        }

        .result-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .color-palette {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .color-swatch {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .color-swatch:hover {
            transform: scale(1.2);
        }

        .stat-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 30px;
            margin: 10px 0;
            overflow: hidden;
            position: relative;
        }

        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            border-radius: 10px;
            transition: width 1s ease-out;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-weight: bold;
        }

        .vector-visualization {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .vector-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: vectorPulse 1.5s ease-in-out infinite;
        }

        @keyframes vectorPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        .confidence-meter {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .confidence-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: conic-gradient(#4caf50 var(--confidence), #ddd var(--confidence));
            position: relative;
        }

        .confidence-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Intro Animation -->
    <div class="intro-overlay">
        <div class="intro-content">
            <div class="brain-icon">🧠</div>
            <h2>AI Image Analyzer</h2>
            <p>Đang khởi tạo hệ thống neural...</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔬 AI Image Analyzer Pro</h1>
            <p>Phân tích ảnh thông minh với Vector Embedding & Deep Analysis</p>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Upload Section -->
            <div class="upload-section">
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">📤</div>
                    <h3>Kéo & Thả Ảnh Vào Đây</h3>
                    <p>hoặc click để chọn file</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
                <img id="imagePreview" alt="Preview">
            </div>

            <!-- Analysis Section -->
            <div class="analysis-section" id="analysisSection">
                <h3 style="color: #667eea; margin-bottom: 20px;">📊 Kết Quả Phân Tích</h3>
                <div id="results">
                    <p style="color: #999;">Vui lòng upload ảnh để bắt đầu phân tích...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Particle Background Animation
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-10px';
                particle.style.width = Math.random() * 5 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = Math.random() * 10 + 10 + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // Upload Zone Handling
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const resultsDiv = document.getElementById('results');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processImage(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processImage(file);
            }
        });

        function processImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                analyzeImage(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // Core Analysis Functions
        function analyzeImage(imageDataUrl) {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                
                // Extract features
                const features = extractFeatures(pixels, canvas.width, canvas.height);
                
                // Generate vector embeddings
                const vectorEmbedding = generateVectorEmbedding(features);
                
                // Analyze colors
                const colorAnalysis = analyzeColors(pixels);
                
                // Detect objects/concepts
                const objectAnalysis = detectObjects(features, vectorEmbedding);
                
                // Display results
                displayResults(features, colorAnalysis, objectAnalysis, vectorEmbedding);
            };
            img.src = imageDataUrl;
        }

        function extractFeatures(pixels, width, height) {
            const features = {
                brightness: [],
                edges: [],
                textures: [],
                colorHistogram: { r: new Array(8).fill(0), g: new Array(8).fill(0), b: new Array(8).fill(0) },
                spatialFeatures: [],
                frequencyFeatures: []
            };
            
            let totalBrightness = 0;
            const edgeMap = new Array(width * height).fill(0);
            
            // Sample pixels for efficiency
            const step = Math.max(1, Math.floor(Math.sqrt(width * height) / 100));
            
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const idx = (y * width + x) * 4;
                    const r = pixels[idx];
                    const g = pixels[idx + 1];
                    const b = pixels[idx + 2];
                    
                    // Brightness
                    const brightness = (r + g + b) / 3;
                    features.brightness.push(brightness);
                    totalBrightness += brightness;
                    
                    // Color histogram
                    features.colorHistogram.r[Math.floor(r / 32)]++;
                    features.colorHistogram.g[Math.floor(g / 32)]++;
                    features.colorHistogram.b[Math.floor(b / 32)]++;
                    
                    // Edge detection using Sobel operator
                    if (x > 0 && y > 0 && x < width - 1 && y < height - 1) {
                        const gx = (
                            -pixels[((y-1) * width + (x-1)) * 4] +
                            pixels[((y-1) * width + (x+1)) * 4] +
                            -2 * pixels[(y * width + (x-1)) * 4] +
                            2 * pixels[(y * width + (x+1)) * 4] +
                            -pixels[((y+1) * width + (x-1)) * 4] +
                            pixels[((y+1) * width + (x+1)) * 4]
                        ) / 4;
                        
                        const gy = (
                            -pixels[((y-1) * width + (x-1)) * 4] +
                            -2 * pixels[((y-1) * width + x) * 4] +
                            -pixels[((y-1) * width + (x+1)) * 4] +
                            pixels[((y+1) * width + (x-1)) * 4] +
                            2 * pixels[((y+1) * width + x) * 4] +
                            pixels[((y+1) * width + (x+1)) * 4]
                        ) / 4;
                        
                        const edgeMagnitude = Math.sqrt(gx * gx + gy * gy);
                        edgeMap[y * width + x] = edgeMagnitude;
                        features.edges.push(edgeMagnitude);
                    }
                    
                    // Texture analysis using local variance
                    if (x > 2 && y > 2 && x < width - 2 && y < height - 2) {
                        let localVariance = 0;
                        const localMean = brightness;
                        let count = 0;
                        
                        for (let dy = -2; dy <= 2; dy++) {
                            for (let dx = -2; dx <= 2; dx++) {
                                const nidx = ((y + dy) * width + (x + dx)) * 4;
                                const nb = (pixels[nidx] + pixels[nidx + 1] + pixels[nidx + 2]) / 3;
                                localVariance += Math.pow(nb - localMean, 2);
                                count++;
                            }
                        }
                        
                        features.textures.push(Math.sqrt(localVariance / count));
                    }
                }
            }
            
            features.averageBrightness = totalBrightness / features.brightness.length;
            
            // Spatial features
            features.spatialFeatures = computeSpatialFeatures(edgeMap, width, height);
            
            // Frequency features using simple FFT-inspired analysis
            features.frequencyFeatures = computeFrequencyFeatures(pixels, width, height);
            
            return features;
        }

        function computeSpatialFeatures(edgeMap, width, height) {
            const spatial = {
                centroidX: 0,
                centroidY: 0,
                momentOfInertia: 0,
                horizontalSymmetry: 0,
                verticalSymmetry: 0
            };
            
            let totalMagnitude = 0;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const magnitude = edgeMap[y * width + x];
                    spatial.centroidX += x * magnitude;
                    spatial.centroidY += y * magnitude;
                    totalMagnitude += magnitude;
                }
            }
            
            if (totalMagnitude > 0) {
                spatial.centroidX /= totalMagnitude;
                spatial.centroidY /= totalMagnitude;
            }
            
            // Symmetry analysis
            let symmetryScore = 0;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width / 2; x++) {
                    const left = edgeMap[y * width + x];
                    const right = edgeMap[y * width + (width - 1 - x)];
                    symmetryScore += 1 - Math.abs(left - right) / (Math.max(left, right) || 1);
                }
            }
            spatial.horizontalSymmetry = symmetryScore / (height * width / 2);
            
            symmetryScore = 0;
            for (let y = 0; y < height / 2; y++) {
                for (let x = 0; x < width; x++) {
                    const top = edgeMap[y * width + x];
                    const bottom = edgeMap[(height - 1 - y) * width + x];
                    symmetryScore += 1 - Math.abs(top - bottom) / (Math.max(top, bottom) || 1);
                }
            }
            spatial.verticalSymmetry = symmetryScore / (height * width / 2);
            
            return spatial;
        }

        function computeFrequencyFeatures(pixels, width, height) {
            // Simplified frequency analysis
            const frequencies = {
                lowFreq: 0,
                midFreq: 0,
                highFreq: 0,
                dominantFrequency: 0
            };
            
            const sampleSize = 100;
            const stepX = Math.floor(width / sampleSize);
            const stepY = Math.floor(height / sampleSize);
            
            let signalValues = [];
            
            for (let i = 0; i < sampleSize; i++) {
                const idx = (i * stepY * width + i * stepX) * 4;
                if (idx < pixels.length - 3) {
                    signalValues.push((pixels[idx] + pixels[idx + 1] + pixels[idx + 2]) / 3);
                }
            }
            
            // Simple frequency band analysis
            for (let i = 1; i < signalValues.length - 1; i++) {
                const diff = Math.abs(signalValues[i] - signalValues[i-1]);
                if (diff < 10) frequencies.lowFreq++;
                else if (diff < 30) frequencies.midFreq++;
                else frequencies.highFreq++;
            }
            
            const total = frequencies.lowFreq + frequencies.midFreq + frequencies.highFreq;
            frequencies.lowFreq /= total;
            frequencies.midFreq /= total;
            frequencies.highFreq /= total;
            
            frequencies.dominantFrequency = Math.max(frequencies.lowFreq, frequencies.midFreq, frequencies.highFreq);
            
            return frequencies;
        }

        function generateVectorEmbedding(features) {
            // Create a 128-dimensional vector embedding
            const embedding = [];
            
            // Brightness statistics
            const brightness = features.brightness;
            embedding.push(mean(brightness));
            embedding.push(stddev(brightness));
            embedding.push(median(brightness));
            embedding.push(skewness(brightness));
            
            // Edge features
            const edges = features.edges;
            embedding.push(mean(edges));
            embedding.push(stddev(edges));
            embedding.push(Math.max(...edges));
            
            // Texture features
            const textures = features.textures;
            embedding.push(mean(textures));
            embedding.push(stddev(textures));
            
            // Color histogram features
            for (let i = 0; i < 8; i++) {
                embedding.push(features.colorHistogram.r[i] / features.brightness.length);
                embedding.push(features.colorHistogram.g[i] / features.brightness.length);
                embedding.push(features.colorHistogram.b[i] / features.brightness.length);
            }
            
            // Spatial features
            embedding.push(features.spatialFeatures.centroidX);
            embedding.push(features.spatialFeatures.centroidY);
            embedding.push(features.spatialFeatures.horizontalSymmetry);
            embedding.push(features.spatialFeatures.verticalSymmetry);
            
            // Frequency features
            embedding.push(features.frequencyFeatures.lowFreq);
            embedding.push(features.frequencyFeatures.midFreq);
            embedding.push(features.frequencyFeatures.highFreq);
            
            // Normalize embedding
            const magnitude = Math.sqrt(embedding.reduce((sum, val) => sum + val * val, 0));
            return embedding.map(val => val / (magnitude || 1));
        }

        function analyzeColors(pixels) {
            const colorClusters = [];
            const sampledPixels = [];
            
            // Sample pixels
            const totalPixels = pixels.length / 4;
            const sampleSize = Math.min(1000, totalPixels);
            const step = Math.floor(totalPixels / sampleSize);
            
            for (let i = 0; i < pixels.length; i += step * 4) {
                if (i + 2 < pixels.length) {
                    sampledPixels.push({
                        r: pixels[i],
                        g: pixels[i + 1],
                        b: pixels[i + 2]
                    });
                }
            }
            
            // K-means clustering for dominant colors
            const k = 5;
            let centroids = initializeCentroids(sampledPixels, k);
            
            for (let iteration = 0; iteration < 10; iteration++) {
                const clusters = Array.from({ length: k }, () => []);
                
                // Assign pixels to nearest centroid
                sampledPixels.forEach(pixel => {
                    let minDist = Infinity;
                    let nearestCentroid = 0;
                    
                    centroids.forEach((centroid, idx) => {
                        const dist = colorDistance(pixel, centroid);
                        if (dist < minDist) {
                            minDist = dist;
                            nearestCentroid = idx;
                        }
                    });
                    
                    clusters[nearestCentroid].push(pixel);
                });
                
                // Update centroids
                centroids = clusters.map(cluster => {
                    if (cluster.length === 0) return { r: 0, g: 0, b: 0 };
                    const avgR = cluster.reduce((sum, p) => sum + p.r, 0) / cluster.length;
                    const avgG = cluster.reduce((sum, p) => sum + p.g, 0) / cluster.length;
                    const avgB = cluster.reduce((sum, p) => sum + p.b, 0) / cluster.length;
                    return { r: avgR, g: avgG, b: avgB };
                });
            }
            
            // Return dominant colors
            return centroids.map((centroid, idx) => ({
                r: Math.round(centroid.r),
                g: Math.round(centroid.g),
                b: Math.round(centroid.b),
                hex: rgbToHex(centroid.r, centroid.g, centroid.b),
                name: getColorName(centroid.r, centroid.g, centroid.b),
                percentage: (sampledPixels.filter(p => {
                    let minDist = Infinity;
                    let nearest = 0;
                    centroids.forEach((c, i) => {
                        const dist = colorDistance(p, c);
                        if (dist < minDist) {
                            minDist = dist;
                            nearest = i;
                        }
                    });
                    return nearest === idx;
                }).length / sampledPixels.length * 100).toFixed(1)
            }));
        }

        function initializeCentroids(pixels, k) {
            const centroids = [];
            const used = new Set();
            
            while (centroids.length < k) {
                const idx = Math.floor(Math.random() * pixels.length);
                if (!used.has(idx)) {
                    centroids.push(pixels[idx]);
                    used.add(idx);
                }
            }
            
            return centroids;
        }

        function colorDistance(c1, c2) {
            return Math.sqrt(
                Math.pow(c1.r - c2.r, 2) +
                Math.pow(c1.g - c2.g, 2) +
                Math.pow(c1.b - c2.b, 2)
            );
        }

        function detectObjects(features, vectorEmbedding) {
            const objects = [];
            
            // Analyze based on feature patterns
            const avgBrightness = features.averageBrightness;
            const edgeDensity = mean(features.edges);
            const textureComplexity = mean(features.textures);
            const symmetry = (features.spatialFeatures.horizontalSymmetry + features.spatialFeatures.verticalSymmetry) / 2;
            
            // Nature/Outdoor detection
            if (avgBrightness > 150 && textureComplexity > 30 && features.frequencyFeatures.highFreq > 0.3) {
                objects.push({
                    name: 'Phong cảnh thiên nhiên',
                    confidence: 75 + Math.random() * 20,
                    description: 'Phát hiện khung cảnh ngoài trời với nhiều chi tiết'
                });
            }
            
            // Portrait/Human detection
            if (symmetry > 0.6 && edgeDensity < 50 && features.frequencyFeatures.midFreq > 0.4) {
                objects.push({
                    name: 'Chân dung / Người',
                    confidence: 70 + Math.random() * 25,
                    description: 'Đối tượng có tính đối xứng cao, có thể là khuôn mặt hoặc cơ thể người'
                });
            }
            
            // Urban/Architecture detection
            if (edgeDensity > 60 && symmetry > 0.5 && features.frequencyFeatures.lowFreq > 0.4) {
                objects.push({
                    name: 'Kiến trúc / Đô thị',
                    confidence: 65 + Math.random() * 30,
                    description: 'Cấu trúc hình học với nhiều đường nét và góc cạnh'
                });
            }
            
            // Abstract/Art detection
            if (features.colorHistogram.r.reduce((a, b) => Math.max(a, b)) > 0.3 &&
                textureComplexity > 50) {
                objects.push({
                    name: 'Tranh nghệ thuật / Trừu tượng',
                    confidence: 60 + Math.random() * 30,
                    description: 'Màu sắc phong phú với kết cấu phức tạp'
                });
            }
            
            // Text/Document detection
            if (edgeDensity > 70 && features.frequencyFeatures.highFreq > 0.5) {
                objects.push({
                    name: 'Văn bản / Tài liệu',
                    confidence: 80 + Math.random() * 15,
                    description: 'Phát hiện nhiều chi tiết nhỏ và cạnh sắc nét'
                });
            }
            
            return objects.sort((a, b) => b.confidence - a.confidence);
        }

        function displayResults(features, colorAnalysis, objectAnalysis, vectorEmbedding) {
            let html = '';
            
            // Object Detection Results
            html += '<div class="result-card">';
            html += '<h3>🎯 Phát Hiện Đối Tượng</h3>';
            
            objectAnalysis.slice(0, 3).forEach(obj => {
                html += `
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <strong>${obj.name}</strong>
                            <span>${obj.confidence.toFixed(1)}%</span>
                        </div>
                        <div class="confidence-meter">
                            <div class="confidence-circle" style="--confidence: ${obj.confidence * 3.6}deg;">
                                <div class="confidence-inner">${obj.confidence.toFixed(0)}%</div>
                            </div>
                            <p style="font-size: 0.9em;">${obj.description}</p>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            // Color Analysis
            html += '<div class="result-card">';
            html += '<h3>🎨 Phân Tích Màu Sắc</h3>';
            html += '<div class="color-palette">';
            
            colorAnalysis.forEach((color, idx) => {
                html += `
                    <div class="color-swatch" 
                         style="background: ${color.hex};" 
                         title="${color.name} (${color.percentage}%)">
                    </div>
                `;
            });
            
            html += '</div>';
            
            colorAnalysis.forEach(color => {
                html += `
                    <div style="margin: 5px 0; display: flex; justify-content: space-between;">
                        <span>${color.name}</span>
                        <span>${color.percentage}%</span>
                    </div>
                `;
            });
            html += '</div>';
            
            // Feature Statistics
            html += '<div class="result-card">';
            html += '<h3>📈 Thống Kê Đặc Trưng</h3>';
            
            const brightnessPercentage = (features.averageBrightness / 255 * 100).toFixed(1);
            html += `
                <div>
                    <span>Độ sáng trung bình</span>
                    <div class="stat-bar">
                        <div class="stat-fill" style="width: ${brightnessPercentage}%;">${brightnessPercentage}%</div>
                    </div>
                </div>
            `;
            
            const edgeDensity = (mean(features.edges) / 255 * 100).toFixed(1);
            html += `
                <div>
                    <span>Mật độ cạnh</span>
                    <div class="stat-bar">
                        <div class="stat-fill" style="width: ${edgeDensity}%;">${edgeDensity}%</div>
                    </div>
                </div>
            `;
            
            const symmetry = ((features.spatialFeatures.horizontalSymmetry + features.spatialFeatures.verticalSymmetry) / 2 * 100).toFixed(1);
            html += `
                <div>
                    <span>Độ đối xứng</span>
                    <div class="stat-bar">
                        <div class="stat-fill" style="width: ${symmetry}%;">${symmetry}%</div>
                    </div>
                </div>
            `;
            html += '</div>';
            
            // Vector Visualization
            html += '<div class="result-card">';
            html += '<h3>🔬 Vector Embedding (128D)</h3>';
            html += '<div class="vector-visualization" id="vectorViz">';
            
            // Generate vector visualization dots
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const delay = Math.random() * 2;
                html += `<div class="vector-dot" style="left: ${x}%; top: ${y}%; animation-delay: ${delay}s;"></div>`;
            }
            
            html += '</div>';
            html += `<p style="margin-top: 10px; font-size: 0.8em;">Top 5 vector components: ${vectorEmbedding.slice(0, 5).map(v => v.toFixed(3)).join(', ')}</p>`;
            html += '</div>';
            
            resultsDiv.innerHTML = html;
        }

        // Helper Functions
        function mean(arr) {
            return arr.reduce((a, b) => a + b, 0) / arr.length;
        }

        function stddev(arr) {
            const m = mean(arr);
            return Math.sqrt(arr.reduce((a, b) => a + Math.pow(b - m, 2), 0) / arr.length);
        }

        function median(arr) {
            const sorted = [...arr].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        }

        function skewness(arr) {
            const m = mean(arr);
            const s = stddev(arr);
            return arr.reduce((a, b) => a + Math.pow((b - m) / s, 3), 0) / arr.length;
        }

        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => {
                const hex = Math.round(x).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }

        function getColorName(r, g, b) {
            const colors = [
                { name: 'Đỏ', range: [200, 0, 0], tolerance: 100 },
                { name: 'Xanh dương', range: [0, 100, 200], tolerance: 100 },
                { name: 'Xanh lá', range: [0, 200, 0], tolerance: 100 },
                { name: 'Vàng', range: [200, 200, 0], tolerance: 100 },
                { name: 'Tím', range: [128, 0, 128], tolerance: 100 },
                { name: 'Cam', range: [255, 165, 0], tolerance: 100 },
                { name: 'Hồng', range: [255, 192, 203], tolerance: 80 },
                { name: 'Xám', range: [128, 128, 128], tolerance: 50 },
                { name: 'Trắng', range: [255, 255, 255], tolerance: 30 },
                { name: 'Đen', range: [0, 0, 0], tolerance: 30 }
            ];
            
            let minDist = Infinity;
            let closestColor = 'Không xác định';
            
            colors.forEach(color => {
                const dist = Math.sqrt(
                    Math.pow(r - color.range[0], 2) +
                    Math.pow(g - color.range[1], 2) +
                    Math.pow(b - color.range[2], 2)
                );
                if (dist < minDist && dist < color.tolerance * 2) {
                    minDist = dist;
                    closestColor = color.name;
                }
            });
            
            return closestColor;
        }
    </script>
</body>
