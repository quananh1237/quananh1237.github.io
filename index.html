<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>16D Audio Demo</title>
</head>
<body>
<h2>16D Audio Demo</h2>
<button id="play">Play</button>

<!-- Dùng file nhạc cục bộ -->
<audio id="audio" src="Sao.wav" crossorigin="anonymous"></audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const track = audioCtx.createMediaElementSource(audio);

// Tạo PannerNode để xoay âm thanh quanh đầu
const panner = audioCtx.createPanner();
panner.panningModel = 'HRTF';  // hiệu ứng 3D
panner.distanceModel = 'inverse';
panner.setPosition(1,0,0);

// Nối audio qua PannerNode
track.connect(panner).connect(audioCtx.destination);

let angle = 0;
const points = 16; // 16D
const step = (2 * Math.PI) / points;

// Hàm xoay âm thanh quanh đầu
function rotateSound() {
    angle += 0.05; // tốc độ xoay
    const x = Math.sin(angle);
    const z = Math.cos(angle);
    panner.setPosition(x, 0, z);
    requestAnimationFrame(rotateSound);
}

// Khi nhấn Play
playBtn.addEventListener('click', () => {
    audioCtx.resume().then(() => {
        audio.play();
        rotateSound();
    });
});
</script>
</body>
</html>
