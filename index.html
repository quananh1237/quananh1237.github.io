<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Get Key</title>
<style>
    body {
        margin: 0;
        background: #0c0c0c;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        overflow: hidden;
    }

    .box {
        width: 350px;
        padding: 30px;
        background: #141414;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(0,255,255,0.4);
        text-align: center;
        animation: fadein 0.6s ease;
    }

    @keyframes fadein {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }

    .progress-container {
        width: 100%;
        height: 12px;
        background: #333;
        border-radius: 6px;
        overflow: hidden;
        margin-top: 20px;
        display: none;
    }

    .progress-bar {
        width: 0%;
        height: 100%;
        background: cyan;
        box-shadow: 0 0 10px cyan;
        transition: 0.3s;
    }

    button {
        width: 100%;
        padding: 12px;
        background: cyan;
        color: black;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        margin-top: 20px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
        box-shadow: 0 0 10px cyan;
    }

    button:hover {
        filter: brightness(1.2);
    }

    #keyBox {
        margin-top: 25px;
        padding: 15px;
        border: 1px solid cyan;
        border-radius: 10px;
        display: none;
        background: rgba(0,255,255,0.1);
        font-size: 20px;
        font-weight: bold;
        word-wrap: break-word;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Get Your Key</h2>

    <div class="progress-container" id="loader">
        <div class="progress-bar" id="bar"></div>
    </div>

    <button id="waitBtn">WAIT</button>

    <div id="keyBox"></div>

    <button id="copyBtn" style="display:none;">COPY KEY</button>
</div>

<script>
    const waitBtn = document.getElementById("waitBtn");
    const loader = document.getElementById("loader");
    const bar = document.getElementById("bar");
    const keyBox = document.getElementById("keyBox");
    const copyBtn = document.getElementById("copyBtn");

    waitBtn.onclick = () => {
        waitBtn.style.display = "none";
        loader.style.display = "block";

        let seconds = 15;
        let progress = 0;

        let timer = setInterval(() => {
            progress += (100 / 15);
            bar.style.width = progress + "%";

            seconds--;
            if (seconds <= 0) {
                clearInterval(timer);
                showKey();
            }
        }, 1000);
    }

    function showKey() {
        // Load KEY từ key.txt
        fetch("key.txt")
            .then(res => res.text())
            .then(key => {
                keyBox.innerText = key.trim();
                keyBox.style.display = "block";
                copyBtn.style.display = "block";
            });
    }

    copyBtn.onclick = () => {
        navigator.clipboard.writeText(keyBox.innerText);
        copyBtn.innerText = "COPIED!";
        setTimeout(() => copyBtn.innerText = "COPY KEY", 1500);
    }
</script>

</body>
</html>
