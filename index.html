<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Trang Game của Tôi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #a8d0e6;
      margin: 0; padding: 20px;
      display: flex; flex-wrap: wrap; justify-content: center;
    }
    .game-card {
      width: 200px;
      margin: 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
      cursor: pointer;
      text-align: center;
      transition: transform 0.3s;
    }
    .game-card:hover {
      transform: scale(1.05);
    }
    .game-card img {
      width: 100%;
      border-radius: 8px 8px 0 0;
    }
    .game-card p {
      margin: 10px 0;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="game-card" onclick="location.href='flappybird.html'">
    <img src="https://i.pinimg.com/originals/cc/98/01/cc98018d3a04bda1c3aa4f6a5e27a040.png" alt="Flappy Bird" />
    <p>Flappy Bird</p>
  </div>

  <div class="game-card" onclick="location.href='kickball.html'">
    <img src="https://hoanghamobile.com/tin-tuc/wp-content/uploads/2024/05/da-bong-online-16.jpg" alt="Game Đá Bóng" />
    <p>Game Đá Bóng</p>
  </div>

  <!-- Thêm card game khác ở đây -->
</body>
</html>
