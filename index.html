<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sonnet 4.5 Interface</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: radial-gradient(circle at top, #0f2027, #000);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* BACKGROUND ANIMATION */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #00f2ff33, #7a00ff33, #ff005533);
    animation: bgMove 12s infinite linear;
}

@keyframes bgMove {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* MAIN PANEL */
.panel {
    position: relative;
    width: 420px;
    padding: 30px;
    border-radius: 18px;
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 40px #00f2ff66;
    animation: panelIn 1.2s ease-out;
}

@keyframes panelIn {
    from { transform: translateY(60px) scale(0.8); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
}

.title {
    text-align: center;
    font-size: 26px;
    letter-spacing: 2px;
    color: #00f2ff;
    margin-bottom: 10px;
}

.version {
    text-align: center;
    color: #aaa;
    font-size: 12px;
    margin-bottom: 25px;
}

.button {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #00f2ff, #7a00ff);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
}

.button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00f2ff;
}

.log {
    margin-top: 20px;
    padding: 12px;
    height: 120px;
    border-radius: 10px;
    background: rgba(0,0,0,0.4);
    color: #00ffcc;
    font-size: 13px;
    overflow-y: auto;
}
</style>
</head>
<body>

<div class="panel">
    <div class="title">SONNET 4.5</div>
    <div class="version">Visual Interface System — v1.0.0</div>

    <button class="button" onclick="run()">▶ Execute Script</button>
    <button class="button" onclick="clearLog()">✖ Clear Log</button>

    <div class="log" id="log">
        > System Ready...
    </div>
</div>

<script>
function run() {
    const log = document.getElementById("log");
    log.innerHTML += "<br>> Executing visual protocol...";
    setTimeout(() => {
        log.innerHTML += "<br>> Animation engine loaded";
    }, 500);
    setTimeout(() => {
        log.innerHTML += "<br>> Sonnet 4.5 Online ✔";
        log.scrollTop = log.scrollHeight;
    }, 1000);
}

function clearLog() {
    document.getElementById("log").innerHTML = "> Log cleared.";
}
</script>

</body>
</html>
