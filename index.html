<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Birch Key</title>
<style>
  body {
    margin:0; padding:0;
    font-family: Arial, sans-serif;
    overflow:hidden;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a1c4fd);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
  }
  @keyframes gradientBG {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  
  #main {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* Ô textbox chính ở giữa */
  #keyInput {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    padding: 15px 20px;
    font-size: 20px;
    border-radius: 15px;
    border: 2px solid #fff;
    outline: none;
    text-align: center;
    width: 300px;
    background: rgba(255,255,255,0.2);
    color: #fff;
  }

  /* Nút vượt link / Check Key */
  .btnMain {
    position: absolute;
    top: calc(50% + 80px);
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(45deg,#ff6ec4,#7873f5);
    color: #fff;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btnMain:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px rgba(255,255,255,0.7);
  }

  /* Nút trở ra */
  #backBtn {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 15px;
    border-radius: 12px;
    border: none;
    background: #ff6ec4;
    color: #fff;
    cursor: pointer;
    display: none;
  }

  /* Game canvas */
  #gameCanvas {
    display: none;
    width: 100vw;
    height: 100vh;
    background: #87ceeb;
  }

  #scoreDisplay {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 5px #000;
    display: none;
  }
</style>
</head>
<body>
<div id="main">
  <input type="text" id="keyInput" placeholder="Nhập key vào đây">
  <button id="goBtn" class="btnMain">Vượt Link</button>
  <button id="checkKeyBtn" class="btnMain" style="display:none;">Check Key</button>
  <button id="backBtn">Trở ra</button>

  <canvas id="gameCanvas"></canvas>
  <div id="scoreDisplay">Score: 0</div>
</div>

<script>
const keyInput = document.getElementById('keyInput');
const goBtn = document.getElementById('goBtn');
const checkKeyBtn = document.getElementById('checkKeyBtn');
const backBtn = document.getElementById('backBtn');

const gameCanvas = document.getElementById('gameCanvas');
const scoreDisplay = document.getElementById('scoreDisplay');

let correctKey = "FLAPPY123"; // key đúng để vượt

// Vượt link
goBtn.addEventListener('click', ()=>{
  keyInput.style.display='none';
  goBtn.style.display='none';
  backBtn.style.display='block';
  checkKeyBtn.style.display='block';
});

// Trở ra
backBtn.addEventListener('click', ()=>{
  keyInput.style.display='block';
  goBtn.style.display='block';
  backBtn.style.display='none';
  checkKeyBtn.style.display='none';
});

// Check key
checkKeyBtn.addEventListener('click', ()=>{
  if(keyInput.value.trim()===correctKey){
    alert('Key đúng! Vào game Flappy Birch...');
    startGame();
    // Ẩn UI nhập key
    keyInput.style.display='none';
    goBtn.style.display='none';
    checkKeyBtn.style.display='none';
    backBtn.style.display='none';
  } else {
    alert('Key sai, thử lại!');
  }
});

// --- Flappy Birch Game ---
let gameInterval, score =0;
let flappyBirdY=200, gravity=2, speed=2;
let pipeX=500, pipeGapY=Math.random()*200+50;

function startGame(){
  score =0;
  flappyBirdY =200;
  pipeX=500;
  pipeGapY = Math.random()*200+50;
  gameCanvas.style.display='block';
  scoreDisplay.style.display='block';

  const ctx = gameCanvas.getContext('2d');
  gameCanvas.width = window.innerWidth;
  gameCanvas.height = window.innerHeight;

  document.addEventListener('keydown', e=>{
    if(e.code==='Space') flappyBirdY -= 50;
  });

  gameInterval = setInterval(()=>{
    ctx.clearRect(0,0,gameCanvas.width, gameCanvas.height);

    // Bird
    flappyBirdY += gravity;
    ctx.fillStyle='yellow';
    ctx.fillRect(100, flappyBirdY,30,30);

    // Pipe
    pipeX -= speed;
    ctx.fillStyle='green';
    ctx.fillRect(pipeX,0,50,pipeGapY);
    ctx.fillRect(pipeX,pipeGapY+150,50,gameCanvas.height-pipeGapY-150);

    // Collision
    if(flappyBirdY<0 || flappyBirdY>gameCanvas.height ||
      (100+30>pipeX && 100<pipeX+50 && (flappyBirdY<pipeGapY || flappyBirdY>pipeGapY+150))){
        gameOver();
    }

    // Score
    if(pipeX +50 <100 && !window.passed){
      score++;
      window.passed=true;
    }
    if(pipeX+50<0){
      pipeX=gameCanvas.width;
      pipeGapY=Math.random()*200+50;
      window.passed=false;
    }

    scoreDisplay.textContent = 'Score: '+score;

  },20);
}

function gameOver(){
  clearInterval(gameInterval);
  alert('Game Over! Score: '+score);
  const resetBtn = document.createElement('button');
  resetBtn.textContent='Reset';
  resetBtn.style.position='absolute';
  resetBtn.style.top='50%';
  resetBtn.style.left='50%';
  resetBtn.style.transform='translate(-50%,-50%)';
  resetBtn.style.padding='10px 20px';
  resetBtn.style.border='none';
  resetBtn.style.borderRadius='10px';
  resetBtn.style.background='#ff6ec4';
  resetBtn.style.color='#fff';
  resetBtn.style.cursor='pointer';
  document.body.appendChild(resetBtn);
  resetBtn.addEventListener('click', ()=>{
    location.reload();
  });
}
</script>
</body>
</html>
