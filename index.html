<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bindz Menu - Get Key</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.2); text-align: center; width: 320px; }
        h1 { color: #ff0000; font-size: 24px; margin-bottom: 20px; }
        #timer-box { font-size: 18px; margin-bottom: 20px; color: #aaa; }
        #key-display { display: none; background: #222; padding: 15px; border-radius: 10px; border: 1px dashed #ff0000; margin-top: 20px; word-break: break-all; }
        button { background: #ff0000; color: #fff; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:disabled { background: #444; cursor: not-allowed; }
        .key-text { color: #00ff00; font-family: monospace; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BINDZ MENU FF</h1>
        <div id="timer-box">Vui lòng chờ <span id="sec">10</span> giây...</div>
        <button id="btn" disabled onclick="showKey()">GET KEY</button>
        
        <div id="key-display">
            <p>Key của bạn (Hết hạn sau 5p):</p>
            <div class="key-text" id="key-value"></div>
            <button onclick="copyKey()" style="margin-top:10px; scale:0.8;">Copy</button>
        </div>
    </div>

    <script>
        let timeLeft = 10;
        const btn = document.getElementById('btn');
        const sec = document.getElementById('sec');

        // Hàm tạo mã ngẫu nhiên cố định theo mỗi 5 phút
        function generateTimeKey() {
            const timeStep = Math.floor(Date.now() / 300000); // 300,000ms = 5 phút
            // Thuật toán băm đơn giản để tạo ký tự random dựa trên timeStep
            const seed = (timeStep * 16807) % 2147483647;
            const randomStr = seed.toString(16).toUpperCase().substring(0, 6);
            return "Bindz-Menu-" + randomStr;
        }

        const countdown = setInterval(() => {
            timeLeft--;
            sec.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timer-box').innerText = "Bạn đã có thể lấy Key!";
                btn.disabled = false;
            }
        }, 1000);

        function showKey() {
            const key = generateTimeKey();
            document.getElementById('key-display').style.display = 'block';
            document.getElementById('key-value').innerText = key;
            btn.style.display = 'none';
            localStorage.setItem('saved_key', key);
            localStorage.setItem('expiry', Math.floor(Date.now() / 300000));
        }

        function copyKey() {
            const text = document.getElementById('key-value').innerText;
            navigator.clipboard.writeText(text);
            alert("Đã copy key!");
        }

        // Chống mất key khi reset trang
        window.onload = () => {
            const savedKey = localStorage.getItem('saved_key');
            const expiry = localStorage.getItem('expiry');
            const currentStep = Math.floor(Date.now() / 300000);
            
            if (savedKey && expiry == currentStep) {
                document.getElementById('key-display').style.display = 'block';
                document.getElementById('key-value').innerText = savedKey;
                document.getElementById('timer-box').innerText = "Key vẫn còn hiệu lực!";
                btn.style.display = 'none';
            }
        };
    </script>
</body>
</html>
